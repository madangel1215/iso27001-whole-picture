<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ISMS 主導稽核員 · 互動課程筆記（ISO/CNS 27001）</title>
<meta name="description" content="ISMS 主導稽核員(ISMS LA) 互動課程筆記：PDCA 運轉 + 風險管理 (ISO 31000/27005) + AI 系統生命週期 (ISO 5338/22989) + 附錄 A 控制；能學、能查、能稽核。" />
<link rel="icon" href="favicon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#08080a" />
<meta property="og:type" content="website" />
<meta property="og:title" content="ISMS 主導稽核員 · 互動課程筆記" />
<meta property="og:description" content="能學、能查、能拿去稽核的 ISMS LA 互動筆記：PDCA · 風險流程 · AI 生命週期 · 附錄A 控制 · ISO 27000 家族。" />
<meta property="og:url" content="https://madangel1215.github.io/ismsla-notes/" />
<meta property="og:image" content="https://madangel1215.github.io/ismsla-notes/og-image.png" />
<meta name="twitter:card" content="summary_large_image" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#08080a; --surface:#121216; --surface-2:#17171c; --surface-3:#1d1d24;
  --line:rgba(255,255,255,.09); --line-2:rgba(255,255,255,.16);
  --text:#ededf0; --text-2:#a3a3ac; --text-3:#8c8c96; --faint:#55555e;
  --accent:#3b82f6;
  --glass:rgba(15,15,19,.74);
  --disc1:#1b1b22; --disc2:#101015; --disc1c:#222530; --disc2c:#121319;
  --cy-node:#15151b; --cy-edge:rgba(255,255,255,.1); --cy-arrow:rgba(255,255,255,.18); --cy-label:#9a9aa3;
  --cat-clause:#6ea8fe; --cat-control:#5ccfa8; --cat-risk:#e0a85f; --cat-ai:#b69bff;
  --warn:#e7b09a; --warn-strong:#dd8a64;
  --font:"Inter","Noto Sans TC",-apple-system,system-ui,sans-serif;
  --mono:"SFMono-Regular",ui-monospace,"JetBrains Mono",monospace;
  --ease:cubic-bezier(.22,.61,.36,1);
}
:root[data-theme="light"]{
  --bg:#f4f5f7; --surface:#ffffff; --surface-2:#eef0f3; --surface-3:#e4e7ec;
  --line:rgba(0,0,0,.1); --line-2:rgba(0,0,0,.2);
  --text:#16181d; --text-2:#474b54; --text-3:#5e636c; --faint:#9aa0aa;
  --accent:#2563eb;
  --glass:rgba(255,255,255,.8);
  --disc1:#ffffff; --disc2:#eef1f5; --disc1c:#f1f5fc; --disc2c:#e4eaf3;
  --cy-node:#ffffff; --cy-edge:rgba(0,0,0,.14); --cy-arrow:rgba(0,0,0,.3); --cy-label:#565a62;
  --cat-clause:#2563eb; --cat-control:#0a8f63; --cat-risk:#9a6700; --cat-ai:#7c3aed;
  --warn:#c0492b; --warn-strong:#a23218;
}
/* 漸層 stop + SVG 箭頭/光暈一律由 token 驅動（CSS 屬性勝過 presentation attribute），深淺色自動跟隨 */
#discFill stop:first-child{stop-color:var(--disc1)} #discFill stop:last-child{stop-color:var(--disc2)}
#discCenter stop:first-child{stop-color:var(--disc1c)} #discCenter stop:last-child{stop-color:var(--disc2c)}
#ah path{fill:var(--text-3)} #aha path{fill:var(--accent)} #glow feDropShadow{flood-color:var(--accent)}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:var(--font);
  -webkit-font-smoothing:antialiased;overflow:hidden}
#app{position:fixed;inset:0;display:flex;flex-direction:column}
::view-transition-old(root),::view-transition-new(root){animation-duration:.22s;animation-timing-function:var(--ease)}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{transition-duration:.01ms!important;animation-duration:.01ms!important;scroll-behavior:auto!important}}

/* ---------- header (slim top bar) ---------- */
.hdr{display:flex;align-items:center;gap:12px;height:52px;padding:0 12px 0 10px;
  border-bottom:1px solid var(--line);background:var(--glass);backdrop-filter:blur(22px) saturate(1.4);z-index:16}
.mark{font-weight:600;letter-spacing:-.02em;white-space:nowrap;font-size:15px}
.mark b{color:var(--text)} .mark .acc{color:var(--accent)}
.view-title{color:var(--text-2);font-size:13.5px;white-space:nowrap;border-left:1px solid var(--line);padding-left:12px}
.icon-btn{background:var(--surface-2);border:1px solid var(--line);border-radius:9px;color:var(--text-2);cursor:pointer;
  height:32px;min-width:32px;padding:0 9px;font-size:14px;display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:all .16s var(--ease)}
.icon-btn:hover{color:var(--text);border-color:var(--line-2)}
.menu-wrap{position:relative;display:flex;gap:8px}
.menu{position:absolute;top:40px;right:0;min-width:214px;background:var(--glass);backdrop-filter:blur(22px) saturate(1.4);
  border:1px solid var(--line);border-radius:12px;box-shadow:0 20px 50px rgba(0,0,0,.5);padding:6px;display:none;z-index:30}
.menu.open{display:block}
.menu .mrow{display:flex;align-items:center;gap:10px;width:100%;padding:9px 11px;border-radius:8px;border:0;background:transparent;
  color:var(--text-2);font-size:13px;cursor:pointer;text-align:left}
.menu .mrow:hover{background:var(--surface-2);color:var(--text)}
.menu .mrow .dot{width:8px;height:8px;border-radius:50%;background:var(--faint);flex-shrink:0}
.menu .mrow.on{color:var(--text)} .menu .mrow.on .dot{background:var(--accent);box-shadow:0 0 6px var(--accent)}
.menu-sep{height:1px;background:var(--line);margin:5px 4px}
.tour-btn{color:var(--accent)!important;border-color:color-mix(in srgb,var(--accent) 45%,var(--line))!important}
/* ---------- body + left rail ---------- */
.body{flex:1;display:flex;min-height:0;position:relative}
.rail{width:206px;flex-shrink:0;overflow-y:auto;padding:10px 8px;background:var(--glass);backdrop-filter:blur(12px);
  border-right:1px solid var(--line);display:flex;flex-direction:column;gap:1px;transition:width .2s var(--ease);z-index:14}
.rail.collapsed{width:58px}
.rail-group{margin-top:6px}
.rail-group-h{font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;color:var(--text-3);text-transform:uppercase;padding:7px 10px 3px;white-space:nowrap;overflow:hidden}
.rail-item{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:9px;cursor:pointer;color:var(--text-2);
  font-size:13.5px;white-space:nowrap;border:1px solid transparent;width:100%;text-align:left;background:transparent;transition:all .14s var(--ease)}
.rail-item:hover{background:var(--surface);color:var(--text)}
.rail-item.on{background:var(--surface-2);color:var(--text);border-color:var(--line-2)}
.rail-item .ri-ico{font-family:var(--mono);font-size:11px;color:var(--text-3);width:30px;flex-shrink:0;text-align:center}
.rail-item.on .ri-ico{color:var(--accent)}
.rail.collapsed .ri-label,.rail.collapsed .rail-group-h{display:none}
.rail.collapsed .rail-item{justify-content:center;padding:9px 0}
.rail.collapsed .rail-item .ri-ico{width:auto}
.spacer{flex:1}
.search{position:relative;display:flex;align-items:center;width:260px}
.search svg{position:absolute;left:10px;width:15px;height:15px;color:var(--text-3);pointer-events:none}
.search input{width:100%;height:32px;padding:0 10px 0 32px;color:var(--text);font-size:13px;
  background:var(--surface-2);border:0;border-radius:9px;box-shadow:inset 0 1px 2px rgba(0,0,0,.4),0 0 0 1px var(--line);outline:none}
.search input:focus{box-shadow:inset 0 1px 2px rgba(0,0,0,.4),0 0 0 1px var(--accent)}
.results{position:absolute;top:38px;left:0;right:0;max-height:50vh;overflow-y:auto;background:var(--glass);
  backdrop-filter:blur(22px);border:1px solid var(--line);border-radius:11px;box-shadow:0 20px 50px rgba(0,0,0,.5);
  padding:5px;display:none;z-index:20}
.results.open{display:block}
.res-item{padding:8px 10px;border-radius:7px;cursor:pointer;display:flex;gap:8px;align-items:baseline}
.res-item:hover,.res-item:focus-visible{background:var(--surface-2);outline:none}
.chip:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
.res-ref{font-family:var(--mono);font-size:10px;color:var(--accent);min-width:54px}
.res-t{font-size:12.5px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* 開關已移入 ⚙ 設定選單（見 .menu .mrow） */

/* ---------- stage ---------- */
.stage{flex:1;min-width:0;position:relative;overflow:hidden;background:radial-gradient(ellipse 70% 60% at 52% 38%, color-mix(in srgb,var(--accent) 5%, transparent), transparent 70%)}
svg#canvas{width:100%;height:100%;display:block}
.view-cap{position:absolute;left:18px;bottom:14px;font-size:12px;color:var(--text-3);
  font-family:var(--mono);letter-spacing:.04em;pointer-events:none}

/* svg shared */
.boundary{fill:none;stroke:var(--line-2);stroke-width:1.2;stroke-dasharray:7 6}
.boundary-label{fill:var(--text-2);font-size:16px;font-weight:600;letter-spacing:.04em;text-anchor:middle}
.axis-label{fill:var(--text-2);font-size:15px;font-weight:600;letter-spacing:.05em;text-anchor:middle}
.ring{fill:none;stroke:var(--line-2);stroke-width:1.8;stroke-linecap:round}
.ring-label{fill:var(--text);font-size:16px;font-weight:600;letter-spacing:.16em;text-anchor:middle}
.spoke{stroke:var(--line);stroke-width:1.1}
.spoke-label{fill:var(--text-3);font-family:var(--mono);font-size:12px;text-anchor:middle}
.flow-line{stroke:var(--line-2);stroke-width:1.6;fill:none;stroke-linecap:round;stroke-linejoin:round}
.flow-label{fill:var(--text-3);font-family:var(--mono);font-size:12.5px;text-anchor:middle}
.iso-tag{fill:var(--accent);font-family:var(--mono);font-size:11.5px}
.iso-line{color:var(--accent);font-family:var(--mono);font-size:13px;margin:-2px 0 4px}
.grp{fill:rgba(255,255,255,.015);stroke:var(--line);stroke-width:1;stroke-dasharray:5 5}
.grp-label{fill:var(--text-2);font-size:14.5px;font-weight:600;letter-spacing:.04em}
.sidebar-rect{fill:var(--surface);stroke:var(--line);stroke-width:1}
.sidebar-text{fill:var(--text-2);font-size:15px;font-weight:600;text-anchor:middle}
.diamond{fill:color-mix(in srgb,var(--accent) 14%,var(--surface));stroke:var(--accent);stroke-width:1}
.diamond-text{fill:var(--text);font-size:13px;text-anchor:middle}
.note{fill:var(--text-2);font-size:12.5px}
.note-h{fill:var(--text-3);font-family:var(--mono);font-size:11px;letter-spacing:.1em}
.out-label{fill:var(--text-2);font-size:14.5px;font-weight:600}
.bigarrow{fill:color-mix(in srgb,var(--accent) 22%,transparent);stroke:var(--accent);stroke-width:1}
.bigarrow-label{fill:var(--accent);font-size:13.5px;font-weight:600;text-anchor:middle}

/* nodes */
.node{cursor:pointer;transition:opacity .22s var(--ease)}
.node.dim{opacity:.22}
.node .disc{fill:url(#discFill);stroke:var(--line-2);stroke-width:1.2;filter:url(#soft);transition:stroke .2s var(--ease),filter .25s var(--ease)}
.node .disc.center{fill:url(#discCenter)}
.node .box{fill:var(--surface);stroke:var(--line-2);stroke-width:1;filter:url(#soft);transition:stroke .2s var(--ease),filter .25s var(--ease)}
.node .box.dash{stroke-dasharray:5 4}
.node .bar{fill:var(--surface);stroke:var(--line-2);stroke-width:1;filter:url(#soft);transition:all .2s var(--ease)}
.node .nm{fill:var(--text);font-size:18px;font-weight:600;text-anchor:middle;pointer-events:none}
.node .nm.sm{font-size:16px}
.node .num{fill:var(--text-3);font-family:var(--mono);font-size:13px;text-anchor:middle;pointer-events:none}
.node .lab{fill:var(--text);font-size:15px;font-weight:500;pointer-events:none}
.node .sub{fill:var(--text-3);font-size:12.5px;pointer-events:none}
.node .ai-sub{fill:var(--text-2);font-size:11px;pointer-events:none}
.node:hover .disc,.node:hover .box,.node:hover .bar{stroke:var(--accent);filter:url(#glow)}
.node.sel .disc,.node.sel .box,.node.sel .bar{stroke:var(--accent);stroke-width:1.8;filter:url(#glow)}
.node.sel .nm,.node.sel .lab{fill:var(--text)}
.node.linked .disc,.node.linked .box,.node.linked .bar{stroke:color-mix(in srgb,var(--accent) 55%,var(--line-2))}
/* 鍵盤焦點：SVG <g> 預設不畫 outline，用與 hover/選取一致的描邊+光暈 */
.node:focus{outline:none}
.node:focus-visible .disc,.node:focus-visible .box,.node:focus-visible .bar{stroke:var(--accent);filter:url(#glow)}
.ctrl-chip{cursor:pointer}
.ctrl-chip rect{fill:color-mix(in srgb,var(--accent) 12%,var(--surface));stroke:var(--accent);stroke-width:.8}
.ctrl-chip text{fill:var(--accent);font-family:var(--mono);font-size:11px;text-anchor:middle}
.std-chip{cursor:pointer}
.std-chip .box{fill:color-mix(in srgb,var(--accent) 7%,var(--surface))}
.std-chip:hover .box,.std-chip:focus-visible .box{stroke:var(--accent);filter:url(#glow)}
.std-chip:focus{outline:none}

/* controls grid (html) */
#grid{position:absolute;inset:0;overflow-y:auto;padding:26px 32px 60px;display:none}
#cy{position:absolute;inset:0;display:none}
#cy.show{display:block}
.cy-legend{position:absolute;left:18px;top:14px;font-size:12px;color:var(--text-3);background:var(--glass);backdrop-filter:blur(12px);border:1px solid var(--line);border-radius:10px;padding:10px 12px;line-height:1.7;z-index:5}
.cy-legend b{color:var(--text)}
.cy-legend .lg{display:inline-block;margin-right:8px;margin-top:4px;cursor:pointer;user-select:none;border:1px solid transparent;border-radius:6px;padding:1px 6px}
.cy-legend .lg:hover{border-color:var(--line-2)}
.cy-legend .lg.off{opacity:.4;text-decoration:line-through}
.cy-legend .cy-note{color:var(--faint);font-size:10.5px;margin-top:6px;max-width:300px;line-height:1.5}
.cy-legend .c{color:var(--cat-clause)}.cy-legend .o{color:var(--cat-control)}.cy-legend .r{color:var(--cat-risk)}.cy-legend .a{color:var(--cat-ai)}
#grid.show{display:block}
/* docs / standards view */
#docs{position:absolute;inset:0;overflow-y:auto;padding:26px 32px 60px;display:none}
#docs.show{display:block}
.docs-intro{font-size:12.5px;color:var(--text-3);margin-bottom:18px;line-height:1.6}
.doc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:8px;margin-bottom:8px}
.pyr{display:flex;flex-direction:column;align-items:center;gap:5px;margin:8px 0 18px}
.pyr-band{border:1px solid var(--line);background:var(--surface);border-radius:8px;padding:9px 14px;cursor:pointer;transition:all .14s var(--ease);display:flex;align-items:center;justify-content:center;gap:10px;color:var(--text-2)}
.pyr-band:hover{border-color:var(--accent);background:var(--surface-2);color:var(--text)}
.pyr-band.on{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent);color:var(--text)}
.pyr-band.ext{border-style:dashed}
.pyr-band .pyr-n{font-size:13.5px;font-weight:500}
.pyr-band .pyr-c{font-family:var(--mono);font-size:11px;color:var(--text-3)}
.pyr-clear{font-family:var(--mono);font-size:11px;color:var(--accent);cursor:pointer;text-transform:none;letter-spacing:0}
.kbadge.tier{color:var(--text-3);border:1px solid var(--line-2)}
.doc-row{display:flex;gap:10px;align-items:flex-start;padding:11px 13px;background:var(--surface);border:1px solid var(--line);border-radius:10px;cursor:pointer;transition:all .16s var(--ease)}
.doc-row:hover{border-color:var(--accent);background:var(--surface-2)}
.doc-row:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
.doc-row.nojump{cursor:default}.doc-row.nojump:hover{border-color:var(--line);background:var(--surface)}
.doc-main{flex:1;min-width:0}
.doc-name{font-size:13.5px;color:var(--text);font-weight:500;line-height:1.4}
.doc-en{font-size:11px;color:var(--text-3);margin-top:1px}
.doc-why{font-size:12px;color:var(--text-2);margin-top:5px;line-height:1.5}
.doc-meta{display:flex;flex-direction:column;align-items:flex-end;gap:5px;white-space:nowrap}
.kbadge{font-family:var(--mono);font-size:10px;border-radius:5px;padding:2px 7px}
.kbadge.doc{color:var(--cat-clause);border:1px solid color-mix(in srgb,var(--cat-clause) 45%,transparent)}
.kbadge.rec{color:var(--cat-risk);border:1px solid color-mix(in srgb,var(--cat-risk) 45%,transparent)}
.kbadge.cert{color:var(--cat-control);border:1px solid color-mix(in srgb,var(--cat-control) 45%,transparent)}
.kbadge.guide{color:var(--text-3);border:1px solid var(--line-2)}
.doc-clause{font-family:var(--mono);font-size:10.5px;color:var(--accent)}
.doc-must{font-family:var(--mono);font-size:9.5px;color:var(--warn-strong)}
.std-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
.std-card{padding:14px 15px;background:var(--surface);border:1px solid var(--line);border-radius:12px;transition:all .16s var(--ease)}
.std-card.jump{cursor:pointer}.std-card.jump:hover{border-color:var(--accent);background:var(--surface-2)}
.std-card.jump:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
.std-num{font-family:var(--mono);font-size:12px;color:var(--accent);font-weight:600}
.std-title{font-size:13px;color:var(--text);margin-top:3px;line-height:1.4}
.std-en{font-size:10.5px;color:var(--text-3);margin-top:1px}
.std-role{font-size:12px;color:var(--text-2);margin-top:8px;line-height:1.55}
.std-rel{font-size:11.5px;color:var(--text-3);margin-top:6px;line-height:1.5;border-top:1px solid var(--line);padding-top:6px}
.std-jump{font-family:var(--mono);font-size:9px;color:var(--text-3);margin-top:7px}
.theme{margin-bottom:26px}
.theme-h{display:flex;align-items:baseline;gap:10px;margin:0 0 12px;padding-bottom:8px;border-bottom:1px solid var(--line)}
.theme-h .th-ref{font-family:var(--mono);font-size:12px;color:var(--accent)}
.theme-h .th-t{font-size:15px;font-weight:600}
.theme-h .th-c{font-family:var(--mono);font-size:11px;color:var(--text-3);margin-left:auto}
.chips{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px}
.chip{padding:10px 12px;background:var(--surface);border:1px solid var(--line);border-radius:10px;cursor:pointer;
  transition:all .16s var(--ease)}
.chip:hover{border-color:var(--accent);background:var(--surface-2)}
.chip.sel{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.chip{transition:opacity .2s var(--ease)} .chip.dim{opacity:.3}
.chip .c-ref{font-family:var(--mono);font-size:11.5px;color:var(--accent)}
.chip .c-t{font-size:13.5px;color:var(--text);margin-top:3px;line-height:1.45}
.ctl-toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px}
.ctl-hint{font-size:12.5px;color:var(--text-3)}
#oscal-btn{font-size:13px;color:var(--text-2);background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:8px 14px;cursor:pointer}
#oscal-btn:hover{color:var(--text);border-color:var(--accent)}

/* ---------- panel ---------- */
.panel{position:absolute;top:14px;right:14px;bottom:14px;width:384px;max-width:calc(100vw - 28px);
  background:var(--glass);backdrop-filter:blur(26px) saturate(1.5);border:1px solid var(--line);border-radius:16px;
  box-shadow:0 24px 60px rgba(0,0,0,.5);display:flex;flex-direction:column;
  transform:translateX(18px);opacity:0;pointer-events:none;transition:transform .3s var(--ease),opacity .3s var(--ease);z-index:8}
.panel.open{transform:none;opacity:1;pointer-events:auto}
.panel-scroll{overflow-y:auto;padding:22px 22px 8px}
.ovl{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;color:var(--text-3);text-transform:uppercase}
.ref{display:inline-block;font-family:var(--mono);font-size:12px;color:var(--text-2);border:1px solid var(--line);
  border-radius:6px;padding:2px 8px;margin:10px 0 8px}
.panel h2{margin:0;font-size:20px;font-weight:600;letter-spacing:-.01em;line-height:1.32}
.en{color:var(--text-3);font-size:13px;margin-top:4px}
.sum{color:var(--text);font-size:14px;margin-top:14px;line-height:1.6}
.sech{font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--text-3);text-transform:uppercase;margin:20px 0 8px}
.sech.ax{color:var(--accent)}
details.acc{border:0;margin:0}
details.acc>summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:7px;user-select:none}
details.acc>summary::-webkit-details-marker{display:none}
details.acc>summary::after{content:"▾";font-size:9px;color:var(--text-3);margin-left:auto;transition:transform .15s var(--ease)}
details.acc:not([open])>summary::after{transform:rotate(-90deg)}
details.acc:not([open])>summary{margin-bottom:6px}
.audit-item{font-size:13px;color:var(--text-2);line-height:1.62;padding:8px 0 8px 18px;border-top:1px solid var(--line);position:relative}
.audit-item::before{content:"›";position:absolute;left:3px;top:8px;color:var(--accent);font-weight:600}
.audit-item.nc{color:var(--warn)}
.audit-item.nc::before{content:"!";color:var(--warn-strong)}
.exp{color:var(--text-2);font-size:14.5px;line-height:1.78}
.sc-item{padding:9px 0;border-top:1px solid var(--line)}
.sc-l{color:var(--text);font-size:13px;font-weight:500}
.sc-n{color:var(--text-3);font-size:12px;margin-top:2px;line-height:1.5}
.attrs{display:flex;flex-wrap:wrap;gap:6px}
.led{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-2);border:1px solid var(--line);border-radius:7px;padding:5px 9px}
.led .d{width:8px;height:8px;border-radius:50%;background:var(--faint)}
.led.on{color:var(--text);border-color:color-mix(in srgb,var(--accent) 50%,var(--line))}
.led.on .d{background:var(--accent);box-shadow:0 0 6px var(--accent)}
.pill{font-size:11.5px;color:var(--text-2);background:var(--surface-2);border:1px solid var(--line);border-radius:99px;padding:4px 10px}
.rel{display:flex;gap:9px;align-items:baseline;padding:9px 0;border-top:1px solid var(--line);cursor:pointer}
.rel:hover .rel-t{color:var(--text)}
.rel-chip{font-family:var(--mono);font-size:9px;color:var(--accent);border:1px solid color-mix(in srgb,var(--accent) 40%,transparent);
  border-radius:5px;padding:2px 6px;white-space:nowrap}
.rel-arr{color:var(--text-3);font-family:var(--mono);font-size:11px}
.rel-t{color:var(--text-2);font-size:12.5px;line-height:1.4;transition:color .15s}
.rel-jump{font-family:var(--mono);font-size:9px;color:var(--text-3);margin-left:auto;white-space:nowrap}
.close{position:absolute;top:14px;right:14px;width:30px;height:30px;border:1px solid var(--line);background:var(--surface);
  border-radius:8px;color:var(--text-3);cursor:pointer;font-size:14px;z-index:2}
.close:hover{color:var(--text)}
.copy{margin:6px 22px 16px;font-size:12px;color:var(--text-3);background:var(--surface);border:1px solid var(--line);
  border-radius:9px;padding:9px;cursor:pointer;text-align:center}
.copy:hover{color:var(--text);border-color:var(--line-2)}
.toast{position:absolute;bottom:18px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--surface-3);
  border:1px solid var(--line-2);border-radius:9px;padding:9px 16px;font-size:12.5px;color:var(--text);opacity:0;
  pointer-events:none;transition:all .25s var(--ease);z-index:30}
.toast.show{opacity:1;transform:translateX(-50%)}
/* onboarding + guided tour */
.modal{position:fixed;inset:0;background:rgba(4,4,6,.8);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;z-index:40;padding:20px}
.modal.show{display:flex}
.modal-card{max-width:560px;background:var(--glass);backdrop-filter:blur(30px) saturate(1.4);border:1px solid var(--line-2);border-radius:20px;padding:32px 34px;box-shadow:0 40px 100px rgba(0,0,0,.6)}
.ob-eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.16em;color:var(--accent);text-transform:uppercase}
.modal-card h1{margin:10px 0 14px;font-size:28px;font-weight:600;letter-spacing:-.02em}
.modal-card p{color:var(--text-2);font-size:14.5px;line-height:1.7;margin:0 0 16px}
.ob-q{font-size:14px;color:var(--text-3);background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:22px}
.ob-q b{color:var(--text)}
.ob-actions{display:flex;gap:12px;flex-wrap:wrap}
.ob-go{flex:1;min-width:200px;background:var(--accent);color:#fff;border:0;border-radius:11px;padding:13px;font-size:14.5px;font-weight:600;cursor:pointer}
.ob-go:hover{filter:brightness(1.12)}
.ob-skip{background:var(--surface-2);color:var(--text-2);border:1px solid var(--line);border-radius:11px;padding:13px 18px;font-size:14px;cursor:pointer}
.ob-skip:hover{color:var(--text)}
.tourcard{position:absolute;left:50%;bottom:22px;transform:translateX(-50%);width:min(760px,calc(100vw - 40px));background:var(--glass);backdrop-filter:blur(26px) saturate(1.4);border:1px solid var(--line-2);border-radius:14px;padding:13px 16px;display:none;align-items:center;gap:14px;box-shadow:0 24px 60px rgba(0,0,0,.5);z-index:35}
.tourcard.show{display:flex}
.tc-step{font-family:var(--mono);font-size:12px;color:var(--accent);white-space:nowrap}
.tc-body{flex:1;min-width:0}
.tc-title{font-size:14.5px;font-weight:600;color:var(--text)}
.tc-text{font-size:12.5px;color:var(--text-2);line-height:1.55;margin-top:3px}
.tc-nav{display:flex;gap:6px;white-space:nowrap}
.tc-nav button{background:var(--surface-2);color:var(--text-2);border:1px solid var(--line);border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer}
.tc-nav button:hover{color:var(--text);border-color:var(--line-2)}
.tc-nav button:disabled{opacity:.4;cursor:default}
@media (max-width:880px){.search{width:150px}.panel{width:auto;left:14px}}
@media (max-width:760px){
  .view-title{display:none}
  .rail{position:fixed;top:52px;bottom:0;left:0;width:206px!important;transform:translateX(-100%);box-shadow:0 20px 60px rgba(0,0,0,.55)}
  .rail.open{transform:none}
  .rail.collapsed .ri-label,.rail.collapsed .rail-group-h{display:revert}
  .rail.collapsed .rail-item{justify-content:flex-start;padding:9px 10px}
}
/* ---------- command palette (⌘K) + help + glossary ---------- */
.cmdk{position:fixed;inset:0;background:rgba(4,4,6,.6);backdrop-filter:blur(6px);display:none;justify-content:center;align-items:flex-start;padding-top:13vh;z-index:50}
.cmdk.open{display:flex}
.cmdk-card{width:min(620px,92vw);background:var(--glass);backdrop-filter:blur(30px) saturate(1.4);border:1px solid var(--line-2);border-radius:16px;box-shadow:0 40px 100px rgba(0,0,0,.6);overflow:hidden}
.cmdk-input{width:100%;border:0;background:transparent;color:var(--text);font-size:16px;padding:17px 20px;outline:none;border-bottom:1px solid var(--line)}
.cmdk-list{max-height:52vh;overflow-y:auto;padding:6px}
.cmdk-item{display:flex;align-items:center;gap:10px;padding:9px 13px;border-radius:9px;cursor:pointer}
.cmdk-item.on,.cmdk-item:hover{background:var(--surface-2)}
.cmdk-kind{font-family:var(--mono);font-size:9px;color:var(--accent);border:1px solid color-mix(in srgb,var(--accent) 40%,transparent);border-radius:5px;padding:2px 6px;min-width:40px;text-align:center;flex-shrink:0}
.cmdk-label{font-size:13.5px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cmdk-hint{font-size:11px;color:var(--text-3);margin-left:auto;white-space:nowrap;flex-shrink:0}
.cmdk-foot{padding:9px 16px;border-top:1px solid var(--line);font-size:11px;color:var(--text-3);font-family:var(--mono)}
.help-grid{display:grid;grid-template-columns:auto 1fr;gap:9px 14px;margin:16px 0 22px;font-size:13px;align-items:center}
.help-grid kbd{font-family:var(--mono);font-size:11px;background:var(--surface-2);border:1px solid var(--line-2);border-bottom-width:2px;border-radius:6px;padding:2px 8px;color:var(--text);justify-self:start;white-space:nowrap}
.help-grid span{color:var(--text-2)}
.term{border-bottom:1px dashed color-mix(in srgb,var(--accent) 60%,transparent);cursor:help}
.term-pop{position:fixed;max-width:290px;background:var(--glass);backdrop-filter:blur(20px) saturate(1.4);border:1px solid var(--line-2);border-radius:10px;box-shadow:0 16px 40px rgba(0,0,0,.5);padding:10px 12px;font-size:12.5px;line-height:1.55;color:var(--text-2);z-index:60;display:none;pointer-events:none}
.term-pop.show{display:block}
.term-pop b{color:var(--text);display:block;margin-bottom:3px;font-size:13px}
/* ---------- 稽核工作底稿 ---------- */
.ws-status{display:flex;gap:6px;margin:2px 0 8px}
.ws-status button{flex:1;font-size:12px;padding:6px 3px;border-radius:7px;border:1px solid var(--line);background:var(--surface);color:var(--text-2);cursor:pointer;transition:all .14s var(--ease)}
.ws-status button:hover{border-color:var(--line-2);color:var(--text)}
.ws-status button.on{font-weight:600;color:var(--text)}
.ws-status button.on[data-st="conform"]{border-color:var(--cat-control);color:var(--cat-control)}
.ws-status button.on[data-st="observe"]{border-color:var(--cat-risk);color:var(--cat-risk)}
.ws-status button.on[data-st="nc"]{border-color:var(--warn-strong);color:var(--warn)}
.ws-status button.on[data-st=""]{border-color:var(--line-2)}
.ws-note{width:100%;min-height:62px;resize:vertical;background:var(--surface);border:1px solid var(--line);border-radius:8px;color:var(--text);font-size:12.5px;line-height:1.5;padding:8px 10px;font-family:var(--font);outline:none}
.ws-note:focus{border-color:var(--accent)}
.chip-st{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--faint);margin-left:7px;vertical-align:middle}
.chip-st.st-conform{background:var(--cat-control)}.chip-st.st-observe{background:var(--cat-risk)}.chip-st.st-nc{background:var(--warn-strong)}
.chip-st.st-none{display:none}
/* ---------- 列印稽核清單 ---------- */
#print-area{display:none}
@media print{
  html,body{overflow:visible!important;height:auto!important;background:#fff;color:#000}
  #app,.term-pop,.cmdk,.modal{display:none!important}
  #print-area{display:block;padding:0 2mm;font-family:"Noto Sans TC",sans-serif}
  .pr-h1{font-size:17pt;font-weight:700;margin:0 0 1mm}
  .pr-meta{font-size:8.5pt;color:#555;margin-bottom:4mm}
  .pr-sec{font-size:12pt;font-weight:700;border-bottom:1.5pt solid #000;margin:6mm 0 2mm;page-break-after:avoid}
  .pr-node{margin:0 0 3.5mm;page-break-inside:avoid}
  .pr-node h3{font-size:10.5pt;margin:0 0 1mm}
  .pr-node .pr-ref{font-family:monospace;color:#555;font-weight:400;margin-right:4px}
  .pr-block{margin:1mm 0 0}
  .pr-block b{font-size:8.5pt;color:#234}
  .pr-q{font-size:9.5pt;margin:.7mm 0 .7mm 5mm;text-indent:-5mm}
  .pr-q::before{content:"\2610  "}
  .pr-e{font-size:9pt;color:#333;margin:.4mm 0 .4mm 5mm}
  .pr-nc{font-size:9pt;color:#900;margin:.4mm 0 .4mm 5mm}
}

<body>
<div id="app">
  <header class="hdr">
    <button class="icon-btn" id="rail-toggle" title="收合/展開選單" aria-label="收合或展開側邊選單">☰</button>
    <div class="mark"><b>ISMS<span class="acc" style="margin:0">·</span>LA</b></div>
    <div class="view-title" id="view-title"></div>
    <div class="spacer"></div>
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <input id="q" type="text" placeholder="搜尋 / ⌘K…" autocomplete="off" />
      <div class="results" id="results"></div>
    </div>
    <div class="menu-wrap">
      <button class="icon-btn tour-btn" id="tour-btn" title="導覽">▶</button>
      <button class="icon-btn" id="settings-btn" title="設定" aria-haspopup="true" aria-expanded="false">⚙</button>
      <div class="menu" id="settings-menu" role="menu">
        <button class="mrow" id="theme-btn" role="menuitem"><span class="dot" id="theme-ico">🌙</span><span>深／淺色</span></button>
        <button class="mrow" id="mode-btn" role="menuitem"><span class="dot"></span><span id="mode-label">學習者視角</span></button>
        <button class="mrow" id="overlay-btn" role="menuitem"><span class="dot"></span><span>疊控制措施</span></button>
        <div class="menu-sep"></div>
        <button class="mrow" id="tour-btn2" role="menuitem"><span class="dot" style="background:var(--accent)"></span><span>▶ 稽核三問導覽</span></button>
        <button class="mrow" id="print-btn" role="menuitem"><span class="dot"></span><span>⎙ 列印稽核清單 (PDF)</span></button>
        <button class="mrow" id="wsexport-btn" role="menuitem"><span class="dot"></span><span>⤓ 匯出稽核底稿 (CSV)</span></button>
      </div>
    </div>
  </header>
  <div class="body">
    <nav class="rail" id="rail" aria-label="主導覽"></nav>
    <div class="stage">
    <svg id="canvas" preserveAspectRatio="xMidYMid meet">
      <defs>
        <radialGradient id="discFill" cx="50%" cy="30%" r="75%"><stop offset="0%"/><stop offset="100%"/></radialGradient>
        <radialGradient id="discCenter" cx="50%" cy="30%" r="75%"><stop offset="0%"/><stop offset="100%"/></radialGradient>
        <filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#3b82f6" flood-opacity="0.55"/></filter>
        <filter id="soft" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.42"/></filter>
        <marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto-start-reverse" markerUnits="userSpaceOnUse"><path d="M0,0 L6.5,3 L0,6 Z" fill="#8c8c96"/></marker>
        <marker id="aha" markerWidth="10" markerHeight="10" refX="6.5" refY="3.2" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L7,3.2 L0,6.4 Z" fill="#3b82f6"/></marker>
      </defs>
      <g id="scene"></g>
    </svg>
    <div id="grid"></div>
    <div id="docs"></div>
    <div id="cy"></div>
    <div class="view-cap" id="cap"></div>
    <aside class="panel" id="panel" aria-hidden="true">
      <button class="close" id="close">✕</button>
      <div class="panel-scroll" id="pbody"></div>
      <div class="copy" id="copy">⧉ 複製此視角連結</div>
    </aside>
    <div class="toast" id="toast"></div>
    <div class="tourcard" id="tourcard">
      <div class="tc-step" id="tc-step"></div>
      <div class="tc-body"><div class="tc-title" id="tc-title"></div><div class="tc-text" id="tc-text"></div></div>
      <div class="tc-nav"><button id="tc-prev">‹</button><button id="tc-next">下一步 ›</button><button id="tc-exit">結束</button></div>
    </div>
    <div class="modal" id="onboard">
      <div class="modal-card">
        <div class="ob-eyebrow">ISMS 主導稽核員 · 互動課程筆記</div>
        <h1>30 秒上手</h1>
        <p>左側選單七個視圖：<b>① PDCA ② 風險流程 ③ AI 生命週期 ④ AI 管理系統(42001) ⑤ 附錄A 控制 ⑥ 文件·標準 ⑦ 關係總覽</b>（☰ 可收合，⌘K 快速跳）。點任一節點看白話說明；右上 <b>⚙</b> 可切「學習者 / 稽核者(LA)視角」、深淺色、疊控制；點節點會把<b>相關的跨圖高亮</b>、其餘變暗。</p>
        <div class="ob-q">稽核三問當主線：<b>這是什麼架構？ · 有什麼風險？ · 產品/服務週期是什麼？</b></div>
        <div class="ob-actions">

          <button class="ob-skip" id="ob-skip">我自己逛</button>

  </div>
  </div>
  <div class="cmdk" id="cmdk" aria-hidden="true">

    <div class="modal-card" style="max-width:440px">

<script type="module">
const SVGNS="http://www.w3.org/2000/svg";
const scene=document.getElementById("scene"), svg=document.getElementById("canvas");
const grid=document.getElementById("grid"), docsEl=document.getElementById("docs"), panel=document.getElementById("panel"), pbody=document.getElementById("pbody");
const toastEl=document.getElementById("toast");
let DATA=null, byId=new Map(), adj=new Map(), curView="pdca", selected=null, overlay=false, mode="learn";
let DOCS=[], STDS=[], docsByNode=new Map(), stdsByNode=new Map(), stdById=new Map();
let WS={};try{WS=JSON.parse(localStorage.getItem("ismsla_ws")||"{}");}catch(e){}
let docTierFilter=null;
function wsSave(){try{localStorage.setItem("ismsla_ws",JSON.stringify(WS));}catch(e){}}
function wsSet(id,patch){WS[id]={...(WS[id]||{}),...patch};if(!WS[id].status&&!(WS[id].note||"").trim())delete WS[id];wsSave();}
function updateChipStatus(id){const ch=grid.querySelector(`.chip[data-id="${id}"] .chip-st`);if(ch)ch.className="chip-st st-"+((WS[id]&&WS[id].status)||"none");}

const el=(t,a,k)=>{const n=document.createElementNS(SVGNS,t);for(const x in a)n.setAttribute(x,a[x]);if(k)for(const c of [].concat(k))if(c)n.append(c);return n;};
const tx=(x,y,cls,s,ex)=>el("text",{x,y,class:cls,...(ex||{})},document.createTextNode(s));
const edgePt=(c,t,pad)=>{const dx=t.x-c.x,dy=t.y-c.y,d=Math.hypot(dx,dy)||1;return{x:c.x+dx/d*(c.r+(pad||0)),y:c.y+dy/d*(c.r+(pad||0))};};
function toast(m){toastEl.textContent=m;toastEl.classList.add("show");setTimeout(()=>toastEl.classList.remove("show"),1800);}

// which view a node belongs to — 依 type 分類（單一來源，與 CAT/renderControls 一致）
function homeView(id){const n=byId.get(id);if(!n)return "pdca";
  if(n.type==="control")return "controls";
  if(n.type==="lifecycle-stage"||n.type==="cross-cutting-band")return "ai";
  if(n.type==="risk-step"||n.type==="risk-technique"||n.type==="bridge")return "risk";
  return "pdca";}  // clause

// ---------- node builders ----------
function disc(id,name,num,x,y,r,center){const g=el("g",{class:"node","data-id":id});

  const A=v("--accent")||"#3b82f6",bg=v("--bg")||"#08080a",node=v("--cy-node")||"#15151b",edge=v("--cy-edge"),arrow=v("--cy-arrow"),label=v("--cy-label")||"#9a9aa3",text=v("--text")||"#ededf0";

    {selector:".faded",style:{"opacity":.06,"text-opacity":0}},
    {selector:".hl",style:{"opacity":1,"color":text}},
    {selector:".sel",style:{"opacity":1,"border-color":A,"border-width":3.5,"background-color":A,"background-opacity":.22,"color":text,"font-size":13,"text-outline-width":2.5,"z-index":99}},
    {selector:".hledge",style:{"opacity":1,"line-color":A,"target-arrow-color":A,"width":2.4}},
    {selector:".hide",style:{"display":"none"}},
  ];}
function applyCyTheme(){if(cy)cy.style(buildCyStyle()).update();}
function initCy(){
  const deg={};for(const e of DATA.edges){deg[e.from]=(deg[e.from]||0)+1;deg[e.to]=(deg[e.to]||0)+1;}
  const conn=DATA.nodes.filter(n=>deg[n.id]);              // 只放有關係的節點（孤立控制不入圖，見附錄A）
  cyHidden=DATA.nodes.length-conn.length;
  const els=[
    ...conn.map(n=>({data:{id:n.id,label:n.ref||n.id,cat:CAT[n.type]||"ai",deg:deg[n.id]}})),
    ...DATA.edges.map(e=>({data:{id:e.from+"__"+e.to,source:e.from,target:e.to}})),
  ];
  const fcose=typeof window.cytoscapeFcose!=="undefined";  // fcose 自然群聚；載入失敗則回退 cose
  const layout=fcose
    ?{name:"fcose",quality:"proof",animate:false,randomize:true,nodeRepulsion:6500,idealEdgeLength:95,nodeSeparation:90,padding:60,packComponents:true}
    :{name:"cose",animate:false,nodeRepulsion:9000,idealEdgeLength:95,padding:50,gravity:.3,componentSpacing:140};
  cy=cytoscape({container:cyEl,elements:els,minZoom:.15,maxZoom:3,wheelSensitivity:.25,layout,style:buildCyStyle()});
  cy.on("tap","node",ev=>select(ev.target.id()));
  cy.on("tap",ev=>{if(ev.target===cy){cy.elements().removeClass("faded hl sel hledge");closePanel();}});
}
function cyHighlight(id){if(!cy)return;const node=cy.getElementById(id);if(node.empty())return;
  cy.elements().addClass("faded").removeClass("hl sel hledge");
  node.closedNeighborhood().nodes().removeClass("faded").addClass("hl");
  node.connectedEdges().removeClass("faded").addClass("hledge");
  node.removeClass("hl").addClass("sel");
  cy.animate({center:{eles:node},zoom:Math.max(cy.zoom(),.8)},{duration:300});}
function toggleCat(cat,el){catFilter[cat]=!catFilter[cat];if(el)el.classList.toggle("off",!catFilter[cat]);
  if(cy)cy.nodes(`[cat="${cat}"]`).toggleClass("hide",!catFilter[cat]);}

      if(links.length)ctl.links=links;
      return ctl;})}));
  return {catalog:{uuid:(self.crypto&&crypto.randomUUID?crypto.randomUUID():"iso27001-catalog"),
    metadata:{title:"ISO/IEC 27001:2022 Annex A — community catalog (paraphrased)","last-modified":new Date().toISOString(),version:DATA.meta?.version||"0","oscal-version":"1.1.2",
      remarks:"Plain-language summaries are original work; ISO/IEC normative text is NOT reproduced. NIST 800-53 mappings are indicative."},groups}};
}

const GLOSSARY={
  "風險擁有者":"對某『風險』當責(accountable)、有權核准其處理並接受剩餘風險的人(ISO 31000)；＝風險當責者，職位需夠高、能調資源。",
  "風險當責者":"同『風險擁有者』——對風險當責、有權核准處理的人。",
  "資產擁有者":"對某『資產』日常管理與保護負責的人或單位(A.5.9)，常為較基層角色；與風險擁有者不同、常為不同人。",
  "適用性聲明":"SoA：列出附錄A每條控制是否適用、理由與實施狀態，是風險決定與控制之間的橋樑(6.1.3 d)。",
  "SoA":"適用性聲明 Statement of Applicability：列出每條控制適用與否、理由、實施狀態(6.1.3 d)。",
  "剩餘風險":"風險處理後仍殘留的風險，須由風險擁有者知情後正式接受並簽核(6.1.3 f)。",
  "風險評鑑":"識別→分析→評估三步合稱(27001 6.1.2)：判斷有哪些風險、多嚴重、優先序。",
  "風險處理":"對評鑑出的風險選對策(降低/接受/移轉/避免)並落實控制(6.1.3)。",
  "風險準則":"判斷風險可不可接受的標準：可能性×衝擊評級，加上風險胃納/容忍度。",
  "當責":"Accountable：對結果負最終責任、有權核准；與『負責(Responsible，實際執行)』不同。",
  "關注方":"CNS 27001:2023 對 interested parties 的官方譯詞，即利害關係人(客戶/主管機關/供應商/員工等)。",
  "文件化資訊":"documented information：須維持(文件)或保留(紀錄)的資訊；27001 多處明確要求。",
  "Annex SL":"ISO 管理系統標準的共用高階結構(條款4–10)，27001/9001/14001/42001/27701 同殼，可整合稽核。",
  "風險胃納":"Risk appetite：組織願意承擔的風險總量與種類。",
};
const GTERMS=Object.keys(GLOSSARY).sort((a,b)=>b.length-a.length);
function tagGlossary(root){
  const seen=new Set();
  const walker=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,{acceptNode:nd=>{
    const p=nd.parentElement;if(!p)return NodeFilter.FILTER_REJECT;
    if(p.closest(".term,summary,.sech,.ref,.rel-chip,.kbadge,.cmdk,h2,.ovl,.iso-line,textarea,input,.ws-note"))return NodeFilter.FILTER_REJECT;
    return NodeFilter.FILTER_ACCEPT;}});
  const targets=[];let n;while(n=walker.nextNode())targets.push(n);
  for(const node of targets){for(const term of GTERMS){if(seen.has(term))continue;
    const idx=node.nodeValue.indexOf(term);if(idx<0)continue;
    const mid=node.splitText(idx);mid.splitText(term.length);
    const span=document.createElement("span");span.className="term";span.dataset.term=term;span.textContent=term;
    span.tabIndex=0;span.setAttribute("role","button");span.setAttribute("aria-label","名詞："+term);
    mid.parentNode.replaceChild(span,mid);seen.add(term);break;}}
}

  const r=el.getBoundingClientRect();const pw=termPop.offsetWidth,ph=termPop.offsetHeight;
  let x=r.left,y=r.bottom+6;if(x+pw>innerWidth-10)x=innerWidth-10-pw;if(y+ph>innerHeight-10)y=r.top-6-ph;

  ...Object.keys(VIEWS).map(k=>({kind:"視圖",label:VIEWS[k].n+" "+VIEWS[k].t,hint:"切視圖",run:()=>switchView(k)})),

  {kind:"動作",label:"切換 學習／稽核者視角",run:()=>{setMode(mode==="learn"?"audit":"learn");if(selected)openPanel(byId.get(selected));updateHash();}},
  {kind:"動作",label:"疊控制措施 開／關",run:()=>document.getElementById("overlay-btn").click()},
  {kind:"動作",label:"開始 稽核三問導覽",run:()=>startTour()},
  {kind:"動作",label:"匯出 OSCAL（93 控制）",run:()=>downloadOscal()},
  {kind:"動作",label:"列印 稽核清單（PDF）",run:()=>printChecklist()},
  {kind:"動作",label:"匯出 稽核底稿（CSV）",run:()=>exportWorksheet()},
  {kind:"動作",label:"清空 稽核底稿",run:()=>{if(confirm("確定清空所有稽核底稿標記與筆記？")){WS={};wsSave();if(curView==="controls")renderControls();toast("已清空稽核底稿");}}},
  {kind:"動作",label:"鍵盤快捷鍵說明",run:()=>openHelp()},
  ...DATA.nodes.map(n=>({kind:n.type==="control"?"控制":n.type==="clause"?"條款":"節點",label:(n.ref?n.ref+" ":"")+(n.title||n.id),hint:"前往",run:()=>select(n.id)})),
  ...STDS.map(s=>({kind:"標準",label:s.number+" "+s.title,hint:"開標準",run:()=>openStdPanel(s)})),
];}
let cmdkPrevFocus=null;
function openCmdk(){if(!cmdkItems.length)buildCmdk();cmdkPrevFocus=document.activeElement;cmdkEl.classList.add("open");cmdkEl.setAttribute("aria-hidden","false");cmdkInput.value="";filterCmdk("");cmdkInput.focus();}
function closeCmdk(){cmdkEl.classList.remove("open");cmdkEl.setAttribute("aria-hidden","true");if(cmdkPrevFocus&&cmdkPrevFocus.focus){cmdkPrevFocus.focus();cmdkPrevFocus=null;}}
function filterCmdk(q){q=q.trim().toLowerCase();
  cmdkShown=(q?cmdkItems.filter(it=>it.label.toLowerCase().includes(q)||it.kind.includes(q)):cmdkItems).slice(0,50);
  cmdkSel=0;renderCmdk();}
function renderCmdk(){cmdkList.innerHTML=cmdkShown.map((it,i)=>`<div class="cmdk-item${i===cmdkSel?" on":""}" data-i="${i}"><span class="cmdk-kind">${it.kind}</span><span class="cmdk-label">${it.label}</span>${it.hint?`<span class="cmdk-hint">${it.hint}</span>`:""}</div>`).join("")||`<div class="cmdk-item"><span class="cmdk-label" style="color:var(--text-3)">無結果</span></div>`;
  cmdkList.querySelectorAll("[data-i]").forEach(el=>el.addEventListener("click",()=>runCmdk(+el.dataset.i)));}
function runCmdk(i){const it=cmdkShown[i];if(!it)return;closeCmdk();it.run();}
cmdkInput.addEventListener("input",e=>filterCmdk(e.target.value));
cmdkInput.addEventListener("keydown",e=>{
  if(e.key==="ArrowDown"){e.preventDefault();cmdkSel=Math.min(cmdkSel+1,cmdkShown.length-1);renderCmdk();document.querySelector(".cmdk-item.on")?.scrollIntoView({block:"nearest"});}
  else if(e.key==="ArrowUp"){e.preventDefault();cmdkSel=Math.max(cmdkSel-1,0);renderCmdk();document.querySelector(".cmdk-item.on")?.scrollIntoView({block:"nearest"});}
  else if(e.key==="Enter"){e.preventDefault();runCmdk(cmdkSel);}});
cmdkEl.addEventListener("click",e=>{if(e.target===cmdkEl)closeCmdk();});

// ---------- 鍵盤快捷鍵 + 說明 ----------
const SHORTCUTS=[["⌘K / Ctrl K","命令面板（跳任何東西）"],["1 – 8","切換八個視圖"],["g","切 學習／稽核者視角"],["t","切 深／淺色"],["\\","收合／展開左側選單"],["/","聚焦搜尋"],["?","顯示此快捷鍵表"],["Esc","關閉面板／選單"]];
function openHelp(){document.getElementById("help-grid").innerHTML=SHORTCUTS.map(([k,d])=>`<kbd>${k}</kbd><span>${d}</span>`).join("");document.getElementById("help").classList.add("show");}
function closeHelp(){document.getElementById("help").classList.remove("show");}
document.getElementById("help-close").addEventListener("click",closeHelp);
document.addEventListener("keydown",e=>{
  if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==="k"){e.preventDefault();openCmdk();return;}
  const tag=(e.target.tagName||"").toLowerCase();if(tag==="input"||tag==="textarea"||e.target.isContentEditable||e.metaKey||e.ctrlKey||e.altKey)return;
  const vk={"1":"pdca","2":"risk","3":"ai","4":"aims","5":"audit","6":"controls","7":"docs","8":"explorer"};
  if(vk[e.key])switchView(vk[e.key]);
  else if(e.key==="g"){setMode(mode==="learn"?"audit":"learn");if(selected)openPanel(byId.get(selected));updateHash();}
  else if(e.key==="t")setTheme(document.documentElement.getAttribute("data-theme")==="light"?"dark":"light");
  else if(e.key==="\\")document.getElementById("rail-toggle").click();
  else if(e.key==="?")openHelp();});

// ---------- 列印稽核清單 (PDF) ----------
function buildPrintChecklist(){
  const pa=document.getElementById("print-area");
  const theme=document.documentElement.getAttribute("data-theme")||"dark";
  const stName={conform:"✔ 符合",observe:"△ 觀察",nc:"✘ 不符合"};
  const prNode=(n)=>{const w=WS[n.id]||{};let s=`<div class="pr-node"><h3><span class="pr-ref">${n.ref||""}</span>${n.title||""}${w.status?` — ${stName[w.status]||""}`:""}</h3>`;
    if(n.audit?.questions?.length)s+=`<div class="pr-block"><b>稽核問句</b>`+n.audit.questions.map(q=>`<div class="pr-q">${q}</div>`).join("")+`</div>`;
    if(n.audit?.evidence?.length)s+=`<div class="pr-block"><b>應備證據</b>`+n.audit.evidence.map(x=>`<div class="pr-e">· ${x}</div>`).join("")+`</div>`;
    if(n.audit?.nonconformities?.length)s+=`<div class="pr-block"><b>常見不符合</b>`+n.audit.nonconformities.map(x=>`<div class="pr-nc">! ${x}</div>`).join("")+`</div>`;
    const docs=docsByNode.get(n.id);if(docs?.length)s+=`<div class="pr-block"><b>必備/相關文件</b>`+docs.map(d=>`<div class="pr-e">· ${d.name}（${d.kind}${d.mandatory?"·必備":""}）</div>`).join("")+`</div>`;
    if(w.note)s+=`<div class="pr-block"><b>稽核筆記</b><div class="pr-e">${w.note.replace(/</g,"&lt;")}</div></div>`;
    return s+`</div>`;};
  const clauses=DATA.nodes.filter(n=>n.type==="clause"),controls=DATA.nodes.filter(n=>n.type==="control");
  pa.innerHTML=`<div class="pr-h1">ISMS 稽核清單 · ISO/IEC 27001:2022</div>`+
    `<div class="pr-meta">ISMS·LA 互動課程筆記 — 稽核三件組（問句／證據／常見不符合）＋必備文件。☐ 供現場勾稽。© 內容 CC BY-NC 4.0。</div>`+
    `<div class="pr-sec">條款 4–10（${clauses.length}）</div>`+clauses.map(prNode).join("")+
    `<div class="pr-sec">附錄 A 控制（${controls.length}）</div>`+controls.map(prNode).join("");
}
function printChecklist(){buildPrintChecklist();setTimeout(()=>window.print(),60);}
document.getElementById("print-btn").addEventListener("click",()=>{closeSettings();printChecklist();});
function exportWorksheet(){
  const stName={conform:"符合",observe:"觀察",nc:"不符合"};
  const rows=[["nodeId","ref","title","type","status","note"]];
  for(const id in WS){const n=byId.get(id);if(!n)continue;const w=WS[id];
    rows.push([id,n.ref||"",n.title||"",n.type,stName[w.status]||"未查",(w.note||"").replace(/\s+/g," ").trim()]);}
  if(rows.length===1){toast("底稿是空的——先在面板標記控制/條款");return;}
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\r\n");
  const blob=new Blob(["﻿"+csv],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="isms-audit-worksheet.csv";a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);toast(`已匯出稽核底稿（${rows.length-1} 筆）`);}
document.getElementById("wsexport-btn").addEventListener("click",()=>{closeSettings();exportWorksheet();});

// deep-link
function updateHash(){const p=new URLSearchParams();p.set("view",curView);if(overlay)p.set("ov","1");if(mode==="audit")p.set("mode","audit");if(document.documentElement.getAttribute("data-theme")==="light")p.set("theme","light");if(selected)p.set("sel",selected);
  history.replaceState(null,"","#"+p.toString());}
function applyHash(){const p=new URLSearchParams(location.hash.replace(/^#/,""));const v=p.get("view");overlay=p.get("ov")==="1";
  if(p.get("theme"))setTheme(p.get("theme"));
  document.getElementById("overlay-btn").classList.toggle("on",overlay);
  setMode(p.get("mode")==="audit"?"audit":"learn");
  switchView(v&&VIEWS[v]?v:"pdca");const s=p.get("sel");if(s&&byId.has(s))select(s);}
document.getElementById("copy").addEventListener("click",()=>{navigator.clipboard?.writeText(location.href);toast("已複製此視角連結");});

// ---------- guided tour: 稽核三問 ----------
const TOUR=[
  {view:"pdca",sel:"clause-5.1",title:"① 這是什麼架構？",text:"ISMS 用 PDCA 運轉：領導[5]為核心，規劃[6]→支援運作[7·8]→績效[9]→改善[10]，外圈計畫·執行·檢核·行動。範圍由條款 4.3 界定。"},
  {view:"pdca",sel:"clause-4.2",title:"① 範圍與要求來源",text:"先確認利害關係人(4.2)的 5 類要求來源：法律／法規立法／合約／標準／監管客戶期待 —— 它們轉成『風險與改善機會』餵進規劃[6]。"},
  {view:"risk",sel:"risk-assessment",title:"② 有什麼風險？",text:"風險用 ISO 31000／27005 流程：風險評鑑(識別→分析→評估)。對應 27001 條款 6.1.2。"},
  {view:"risk",sel:"soa",title:"② 怎麼接到控制？",text:"風險處理選出控制、記入『適用性聲明 SoA』，再排風險處理計畫；剩餘風險須持續監督審查。對應條款 6.1.3。"},
  {view:"ai",sel:"ai-operation-monitoring",title:"③ 你們的產品／服務週期是什麼？",text:"AI 系統生命週期(ISO 5338／22989)：起始→開發→V&V→部署→營運監督→重新評估→汰除；治理／風險／安全等橫向帶貫穿全程。"},
  {view:"controls",sel:"control-a.5.31",title:"④ 證據：你做了哪些控制？",text:"附錄 A 93 控制是落地證據。現已切到『稽核者視角』—— 每條都有 稽核問句／應備證據／常見不符合，直接拿去稽核或教學。",mode:"audit"},
];
let tourIdx=-1;
const tcEl=document.getElementById("tourcard");
function showStep(i){tourIdx=i;const s=TOUR[i];
  if(s.mode)setMode(s.mode);
  switchView(s.view);if(s.sel)select(s.sel);
  document.getElementById("tc-step").textContent=(i+1)+" / "+TOUR.length;
  document.getElementById("tc-title").textContent=s.title;
  document.getElementById("tc-text").textContent=s.text;
  document.getElementById("tc-prev").disabled=i===0;
  document.getElementById("tc-next").textContent=i===TOUR.length-1?"完成 ✓":"下一步 ›";
  tcEl.classList.add("show");}
function startTour(){closeOnboard();showStep(0);}
function exitTour(){tourIdx=-1;tcEl.classList.remove("show");}
document.getElementById("tc-next").addEventListener("click",()=>{tourIdx<TOUR.length-1?showStep(tourIdx+1):exitTour();});
document.getElementById("tc-prev").addEventListener("click",()=>{if(tourIdx>0)showStep(tourIdx-1);});
document.getElementById("tc-exit").addEventListener("click",exitTour);
document.getElementById("tour-btn").addEventListener("click",startTour);
document.getElementById("tour-btn2").addEventListener("click",()=>{closeSettings();startTour();});
document.addEventListener("keydown",(e)=>{if(tourIdx<0)return;if(e.key==="ArrowRight")showStep(Math.min(tourIdx+1,TOUR.length-1));else if(e.key==="ArrowLeft")showStep(Math.max(tourIdx-1,0));});
// ---------- onboarding ----------
function closeOnboard(){document.getElementById("onboard").classList.remove("show");try{localStorage.setItem("iso_seen","1");}catch(e){}}
document.getElementById("ob-skip").addEventListener("click",closeOnboard);
document.getElementById("ob-tour").addEventListener("click",startTour);

// ---------- boot ----------
(async function(){
  try{const r=await fetch("./data/data.json");DATA=await r.json();}catch(e){document.getElementById("cap").textContent="無法載入 data.json（需以 http 開啟）";return;}
  byId=new Map(DATA.nodes.map(n=>[n.id,n]));
  try{const sr=await fetch("./data/supplements.json");if(sr.ok){const sup=await sr.json();for(const it of (sup.items||[])){const n=byId.get(it.nodeId);if(n)(n.supplements=n.supplements||[]).push(it);}}}catch(e){}
  try{const dr=await fetch("./data/documents.json");if(dr.ok)DOCS=(await dr.json()).items||[];}catch(e){}
  try{const tr=await fetch("./data/standards.json");if(tr.ok)STDS=(await tr.json()).items||[];}catch(e){}
  for(const d of DOCS)if(d.nodeId&&byId.has(d.nodeId))(docsByNode.get(d.nodeId)||docsByNode.set(d.nodeId,[]).get(d.nodeId)).push(d);
  stdById=new Map(STDS.map(s=>[s.id,s]));
  for(const s of STDS)for(const nid of (s.nodes||[]))if(byId.has(nid))(stdsByNode.get(nid)||stdsByNode.set(nid,[]).get(nid)).push(s);
  for(const e of DATA.edges){(adj.get(e.from)||adj.set(e.from,[]).get(e.from)).push({other:e.to,rel:e.rel,dir:"out"});
    (adj.get(e.to)||adj.set(e.to,[]).get(e.to)).push({other:e.from,rel:e.rel,dir:"in"});}
  if(DATA.meta?.accent)document.documentElement.style.setProperty("--accent",DATA.meta.accent);
  buildRail();
  const firstVisit = location.hash.length<=1;   // capture before switchView rewrites the hash
  if(location.hash.length>1)applyHash();else switchView("pdca");
  try{ if(firstVisit && !localStorage.getItem("iso_seen")) document.getElementById("onboard").classList.add("show"); }catch(e){}
})();
// ---------- 統一 Esc（單一優先序，只關最上層；不會誤關詳情面板） ----------
document.addEventListener("keydown",e=>{if(e.key!=="Escape")return;
  if(document.getElementById("help").classList.contains("show")){closeHelp();return;}
  if(cmdkEl.classList.contains("open")){closeCmdk();return;}
  if(settingsMenu.classList.contains("open")){closeSettings();return;}
  if(tourIdx>=0){exitTour();return;}
  if(results.classList.contains("open")){results.classList.remove("open");return;}
  if(railEl.classList.contains("open")){railEl.classList.remove("open");return;}
  if(document.getElementById("onboard").classList.contains("show")){closeOnboard();return;}
  closePanel();});
// 任何列印觸發(含瀏覽器 Cmd/Ctrl+P)都先建好清單，避免印出空白
window.addEventListener("beforeprint",buildPrintChecklist);
// PWA：註冊 service worker（離線可用；需 https 或 localhost）
if("serviceWorker" in navigator)window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
