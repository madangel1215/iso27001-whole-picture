<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ISO/CNS 27001:2023 互動全景圖</title>
<meta name="description" content="ISO/CNS 27001:2023 ISMS 互動全景圖：PDCA 運轉 + 風險管理 (ISO 31000/27005) + AI 系統生命週期 (ISO 5338/22989) + 附錄 A 控制。" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#08080a; --surface:#121216; --surface-2:#17171c; --surface-3:#1d1d24;
  --line:rgba(255,255,255,.09); --line-2:rgba(255,255,255,.16);
  --text:#ededf0; --text-2:#a3a3ac; --text-3:#8c8c96; --faint:#55555e;
  --accent:#3b82f6;
  --glass:rgba(15,15,19,.74);
  --font:"Inter","Noto Sans TC",-apple-system,system-ui,sans-serif;
  --mono:"SFMono-Regular",ui-monospace,"JetBrains Mono",monospace;
  --ease:cubic-bezier(.22,.61,.36,1);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:var(--font);
  -webkit-font-smoothing:antialiased;overflow:hidden}
#app{position:fixed;inset:0;display:flex;flex-direction:column}

/* ---------- header ---------- */
.hdr{display:flex;align-items:center;gap:16px;height:56px;padding:0 18px;
  border-bottom:1px solid var(--line);background:var(--glass);backdrop-filter:blur(22px) saturate(1.4);z-index:6}
.mark{font-weight:600;letter-spacing:-.02em;white-space:nowrap}
.mark b{color:var(--text)} .mark .acc{color:var(--accent)} .mark span{color:var(--text-3);font-weight:400;margin-left:8px;font-size:13px}
.tabs{display:flex;gap:4px;margin-left:6px}
.tab{font-size:13px;color:var(--text-2);background:transparent;border:1px solid transparent;border-radius:9px;
  padding:6px 12px;cursor:pointer;white-space:nowrap;transition:all .18s var(--ease)}
.tab:hover{color:var(--text);background:var(--surface)}
.tab.on{color:var(--text);background:var(--surface-2);border-color:var(--line-2);box-shadow:inset 0 1px 0 rgba(255,255,255,.05)}
.tab .t-num{font-family:var(--mono);font-size:10px;color:var(--text-3);margin-right:5px}
.tab.on .t-num{color:var(--accent)}
.spacer{flex:1}
.search{position:relative;display:flex;align-items:center;width:260px}
.search svg{position:absolute;left:10px;width:15px;height:15px;color:var(--text-3);pointer-events:none}
.search input{width:100%;height:32px;padding:0 10px 0 32px;color:var(--text);font-size:13px;
  background:var(--surface-2);border:0;border-radius:9px;box-shadow:inset 0 1px 2px rgba(0,0,0,.4),0 0 0 1px var(--line);outline:none}
.search input:focus{box-shadow:inset 0 1px 2px rgba(0,0,0,.4),0 0 0 1px var(--accent)}
.results{position:absolute;top:38px;left:0;right:0;max-height:50vh;overflow-y:auto;background:var(--glass);
  backdrop-filter:blur(22px);border:1px solid var(--line);border-radius:11px;box-shadow:0 20px 50px rgba(0,0,0,.5);
  padding:5px;display:none;z-index:20}
.results.open{display:block}
.res-item{padding:8px 10px;border-radius:7px;cursor:pointer;display:flex;gap:8px;align-items:baseline}
.res-item:hover{background:var(--surface-2)}
.res-ref{font-family:var(--mono);font-size:10px;color:var(--accent);min-width:54px}
.res-t{font-size:12.5px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.toggle{font-size:12.5px;color:var(--text-2);background:var(--surface-1,transparent);border:1px solid var(--line);
  border-radius:99px;padding:6px 12px;cursor:pointer;display:flex;align-items:center;gap:7px;white-space:nowrap}
.toggle .dot{width:7px;height:7px;border-radius:50%;background:var(--faint)}
.toggle.on{color:var(--text);border-color:var(--accent)}
.toggle.on .dot{background:var(--accent);box-shadow:0 0 6px var(--accent)}

/* ---------- stage ---------- */
.stage{flex:1;position:relative;overflow:hidden}
svg#canvas{width:100%;height:100%;display:block}
.view-cap{position:absolute;left:18px;bottom:14px;font-size:12px;color:var(--text-3);
  font-family:var(--mono);letter-spacing:.04em;pointer-events:none}

/* svg shared */
.boundary{fill:none;stroke:var(--line-2);stroke-width:1.2;stroke-dasharray:7 6}
.boundary-label{fill:var(--text-2);font-size:16px;font-weight:600;letter-spacing:.04em;text-anchor:middle}
.axis-label{fill:var(--text-2);font-size:15px;font-weight:600;letter-spacing:.05em;text-anchor:middle}
.ring{fill:none;stroke:var(--line-2);stroke-width:1.8}
.ring-label{fill:var(--text);font-size:16px;font-weight:600;letter-spacing:.16em;text-anchor:middle}
.spoke{stroke:var(--line);stroke-width:1.1}
.spoke-label{fill:var(--text-3);font-family:var(--mono);font-size:12px;text-anchor:middle}
.flow-line{stroke:var(--line-2);stroke-width:1.6;fill:none}
.flow-label{fill:var(--text-3);font-family:var(--mono);font-size:12.5px;text-anchor:middle}
.grp{fill:rgba(255,255,255,.015);stroke:var(--line);stroke-width:1;stroke-dasharray:5 5}
.grp-label{fill:var(--text-2);font-size:14.5px;font-weight:600;letter-spacing:.04em}
.sidebar-rect{fill:var(--surface);stroke:var(--line);stroke-width:1}
.sidebar-text{fill:var(--text-2);font-size:15px;font-weight:600;text-anchor:middle}
.diamond{fill:color-mix(in srgb,var(--accent) 14%,var(--surface));stroke:var(--accent);stroke-width:1}
.diamond-text{fill:var(--text);font-size:13px;text-anchor:middle}
.note{fill:var(--text-2);font-size:12.5px}
.note-h{fill:var(--text-3);font-family:var(--mono);font-size:11px;letter-spacing:.1em}
.out-label{fill:var(--text-2);font-size:14.5px;font-weight:600}
.bigarrow{fill:color-mix(in srgb,var(--accent) 22%,transparent);stroke:var(--accent);stroke-width:1}
.bigarrow-label{fill:var(--accent);font-size:13.5px;font-weight:600;text-anchor:middle}

/* nodes */
.node{cursor:pointer;transition:opacity .22s var(--ease)}
.node.dim{opacity:.22}
.node .disc{fill:url(#discFill);stroke:var(--line-2);stroke-width:1.2;transition:stroke .2s var(--ease),filter .25s var(--ease)}
.node .disc.center{fill:url(#discCenter)}
.node .box{fill:var(--surface);stroke:var(--line-2);stroke-width:1;transition:stroke .2s var(--ease),filter .25s var(--ease)}
.node .box.dash{stroke-dasharray:5 4}
.node .bar{fill:var(--surface);stroke:var(--line-2);stroke-width:1;transition:all .2s var(--ease)}
.node .nm{fill:var(--text);font-size:18px;font-weight:600;text-anchor:middle;pointer-events:none}
.node .nm.sm{font-size:16px}
.node .num{fill:var(--text-3);font-family:var(--mono);font-size:13px;text-anchor:middle;pointer-events:none}
.node .lab{fill:var(--text);font-size:15px;font-weight:500;pointer-events:none}
.node .sub{fill:var(--text-3);font-size:12.5px;pointer-events:none}
.node:hover .disc,.node:hover .box,.node:hover .bar{stroke:var(--accent);filter:url(#glow)}
.node.sel .disc,.node.sel .box,.node.sel .bar{stroke:var(--accent);stroke-width:1.8;filter:url(#glow)}
.node.sel .nm,.node.sel .lab{fill:#fff}
.node.linked .disc,.node.linked .box,.node.linked .bar{stroke:color-mix(in srgb,var(--accent) 55%,var(--line-2))}
.ctrl-chip{cursor:pointer}
.ctrl-chip rect{fill:color-mix(in srgb,var(--accent) 12%,var(--surface));stroke:var(--accent);stroke-width:.8}
.ctrl-chip text{fill:var(--accent);font-family:var(--mono);font-size:11px;text-anchor:middle}

/* controls grid (html) */
#grid{position:absolute;inset:0;overflow-y:auto;padding:26px 32px 60px;display:none}
#grid.show{display:block}
.theme{margin-bottom:26px}
.theme-h{display:flex;align-items:baseline;gap:10px;margin:0 0 12px;padding-bottom:8px;border-bottom:1px solid var(--line)}
.theme-h .th-ref{font-family:var(--mono);font-size:12px;color:var(--accent)}
.theme-h .th-t{font-size:15px;font-weight:600}
.theme-h .th-c{font-family:var(--mono);font-size:11px;color:var(--text-3);margin-left:auto}
.chips{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px}
.chip{padding:10px 12px;background:var(--surface);border:1px solid var(--line);border-radius:10px;cursor:pointer;
  transition:all .16s var(--ease)}
.chip:hover{border-color:var(--accent);background:var(--surface-2)}
.chip.sel{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.chip{transition:opacity .2s var(--ease)} .chip.dim{opacity:.3}
.chip .c-ref{font-family:var(--mono);font-size:11.5px;color:var(--accent)}
.chip .c-t{font-size:13.5px;color:var(--text);margin-top:3px;line-height:1.45}

/* ---------- panel ---------- */
.panel{position:absolute;top:14px;right:14px;bottom:14px;width:384px;max-width:calc(100vw - 28px);
  background:var(--glass);backdrop-filter:blur(26px) saturate(1.5);border:1px solid var(--line);border-radius:16px;
  box-shadow:0 24px 60px rgba(0,0,0,.5);display:flex;flex-direction:column;
  transform:translateX(18px);opacity:0;pointer-events:none;transition:transform .3s var(--ease),opacity .3s var(--ease);z-index:8}
.panel.open{transform:none;opacity:1;pointer-events:auto}
.panel-scroll{overflow-y:auto;padding:22px 22px 8px}
.ovl{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;color:var(--text-3);text-transform:uppercase}
.ref{display:inline-block;font-family:var(--mono);font-size:12px;color:var(--text-2);border:1px solid var(--line);
  border-radius:6px;padding:2px 8px;margin:10px 0 8px}
.panel h2{margin:0;font-size:20px;font-weight:600;letter-spacing:-.01em;line-height:1.32}
.en{color:var(--text-3);font-size:13px;margin-top:4px}
.sum{color:var(--text);font-size:14px;margin-top:14px;line-height:1.6}
.sech{font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--text-3);text-transform:uppercase;margin:20px 0 8px}
.sech.ax{color:var(--accent)}
.audit-item{font-size:13px;color:var(--text-2);line-height:1.62;padding:8px 0 8px 18px;border-top:1px solid var(--line);position:relative}
.audit-item::before{content:"›";position:absolute;left:3px;top:8px;color:var(--accent);font-weight:600}
.audit-item.nc{color:#e7b09a}
.audit-item.nc::before{content:"!";color:#dd8a64}
.exp{color:var(--text-2);font-size:14.5px;line-height:1.78}
.sc-item{padding:9px 0;border-top:1px solid var(--line)}
.sc-l{color:var(--text);font-size:13px;font-weight:500}
.sc-n{color:var(--text-3);font-size:12px;margin-top:2px;line-height:1.5}
.attrs{display:flex;flex-wrap:wrap;gap:6px}
.led{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-2);border:1px solid var(--line);border-radius:7px;padding:5px 9px}
.led .d{width:8px;height:8px;border-radius:50%;background:var(--faint)}
.led.on{color:var(--text);border-color:color-mix(in srgb,var(--accent) 50%,var(--line))}
.led.on .d{background:var(--accent);box-shadow:0 0 6px var(--accent)}
.pill{font-size:11.5px;color:var(--text-2);background:var(--surface-2);border:1px solid var(--line);border-radius:99px;padding:4px 10px}
.rel{display:flex;gap:9px;align-items:baseline;padding:9px 0;border-top:1px solid var(--line);cursor:pointer}
.rel:hover .rel-t{color:#fff}
.rel-chip{font-family:var(--mono);font-size:9px;color:var(--accent);border:1px solid color-mix(in srgb,var(--accent) 40%,transparent);
  border-radius:5px;padding:2px 6px;white-space:nowrap}
.rel-arr{color:var(--text-3);font-family:var(--mono);font-size:11px}
.rel-t{color:var(--text-2);font-size:12.5px;line-height:1.4;transition:color .15s}
.rel-jump{font-family:var(--mono);font-size:9px;color:var(--text-3);margin-left:auto;white-space:nowrap}
.close{position:absolute;top:14px;right:14px;width:30px;height:30px;border:1px solid var(--line);background:var(--surface);
  border-radius:8px;color:var(--text-3);cursor:pointer;font-size:14px;z-index:2}
.close:hover{color:var(--text)}
.copy{margin:6px 22px 16px;font-size:12px;color:var(--text-3);background:var(--surface);border:1px solid var(--line);
  border-radius:9px;padding:9px;cursor:pointer;text-align:center}
.copy:hover{color:var(--text);border-color:var(--line-2)}
.toast{position:absolute;bottom:18px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--surface-3);
  border:1px solid var(--line-2);border-radius:9px;padding:9px 16px;font-size:12.5px;color:var(--text);opacity:0;
  pointer-events:none;transition:all .25s var(--ease);z-index:30}
.toast.show{opacity:1;transform:translateX(-50%)}
/* onboarding + guided tour */
.modal{position:absolute;inset:0;background:rgba(4,4,6,.8);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;z-index:40;padding:20px}
.modal.show{display:flex}
.modal-card{max-width:560px;background:var(--glass);backdrop-filter:blur(30px) saturate(1.4);border:1px solid var(--line-2);border-radius:20px;padding:32px 34px;box-shadow:0 40px 100px rgba(0,0,0,.6)}
.ob-eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.16em;color:var(--accent);text-transform:uppercase}
.modal-card h1{margin:10px 0 14px;font-size:28px;font-weight:600;letter-spacing:-.02em}
.modal-card p{color:var(--text-2);font-size:14.5px;line-height:1.7;margin:0 0 16px}
.ob-q{font-size:14px;color:var(--text-3);background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:22px}
.ob-q b{color:var(--text)}
.ob-actions{display:flex;gap:12px;flex-wrap:wrap}
.ob-go{flex:1;min-width:200px;background:var(--accent);color:#fff;border:0;border-radius:11px;padding:13px;font-size:14.5px;font-weight:600;cursor:pointer}
.ob-go:hover{filter:brightness(1.12)}
.ob-skip{background:var(--surface-2);color:var(--text-2);border:1px solid var(--line);border-radius:11px;padding:13px 18px;font-size:14px;cursor:pointer}
.ob-skip:hover{color:var(--text)}
.tourcard{position:absolute;left:50%;bottom:22px;transform:translateX(-50%);width:min(760px,calc(100vw - 40px));background:var(--glass);backdrop-filter:blur(26px) saturate(1.4);border:1px solid var(--line-2);border-radius:14px;padding:13px 16px;display:none;align-items:center;gap:14px;box-shadow:0 24px 60px rgba(0,0,0,.5);z-index:35}
.tourcard.show{display:flex}
.tc-step{font-family:var(--mono);font-size:12px;color:var(--accent);white-space:nowrap}
.tc-body{flex:1;min-width:0}
.tc-title{font-size:14.5px;font-weight:600;color:var(--text)}
.tc-text{font-size:12.5px;color:var(--text-2);line-height:1.55;margin-top:3px}
.tc-nav{display:flex;gap:6px;white-space:nowrap}
.tc-nav button{background:var(--surface-2);color:var(--text-2);border:1px solid var(--line);border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer}
.tc-nav button:hover{color:var(--text);border-color:var(--line-2)}
.tc-nav button:disabled{opacity:.4;cursor:default}
.tour-btn{background:color-mix(in srgb,var(--accent) 16%,transparent)!important;border-color:var(--accent)!important;color:var(--text)!important}
@media (max-width:880px){.tabs .t-txt{display:none}.search{width:150px}.panel{width:auto;left:14px}}
</style>
</head>
<body>
<div id="app">
  <header class="hdr">
    <div class="mark"><b>ISO<span class="acc" style="margin:0">·</span>27001</b><span>互動全景圖</span></div>
    <nav class="tabs" id="tabs"></nav>
    <div class="spacer"></div>
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <input id="q" type="text" placeholder="搜尋條款 / 控制 / 編號…" autocomplete="off" />
      <div class="results" id="results"></div>
    </div>
    <button class="toggle tour-btn" id="tour-btn">▶ 導覽</button>
    <button class="toggle" id="mode-btn"><span class="dot"></span><span id="mode-label">學習者視角</span></button>
    <button class="toggle" id="overlay-btn"><span class="dot"></span>疊控制措施</button>
  </header>
  <div class="stage">
    <svg id="canvas" preserveAspectRatio="xMidYMid meet">
      <defs>
        <radialGradient id="discFill" cx="50%" cy="30%" r="75%"><stop offset="0%" stop-color="#1b1b22"/><stop offset="100%" stop-color="#101015"/></radialGradient>
        <radialGradient id="discCenter" cx="50%" cy="30%" r="75%"><stop offset="0%" stop-color="#222530"/><stop offset="100%" stop-color="#121319"/></radialGradient>
        <filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#3b82f6" flood-opacity="0.55"/></filter>
        <marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L6.5,3 L0,6 Z" fill="#8c8c96"/></marker>
        <marker id="aha" markerWidth="10" markerHeight="10" refX="6.5" refY="3.2" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L7,3.2 L0,6.4 Z" fill="#3b82f6"/></marker>
      </defs>
      <g id="scene"></g>
    </svg>
    <div id="grid"></div>
    <div class="view-cap" id="cap"></div>
    <aside class="panel" id="panel" aria-hidden="true">
      <button class="close" id="close">✕</button>
      <div class="panel-scroll" id="pbody"></div>
      <div class="copy" id="copy">⧉ 複製此視角連結</div>
    </aside>
    <div class="toast" id="toast"></div>
    <div class="tourcard" id="tourcard">
      <div class="tc-step" id="tc-step"></div>
      <div class="tc-body"><div class="tc-title" id="tc-title"></div><div class="tc-text" id="tc-text"></div></div>
      <div class="tc-nav"><button id="tc-prev">‹</button><button id="tc-next">下一步 ›</button><button id="tc-exit">結束</button></div>
    </div>
    <div class="modal" id="onboard">
      <div class="modal-card">
        <div class="ob-eyebrow">ISO/CNS 27001:2023 · 互動全景圖</div>
        <h1>30 秒上手</h1>
        <p>四個分頁：<b>① PDCA 運轉 ② 風險流程 ③ AI 生命週期 ④ 附錄A 93 控制</b>。點任一節點看白話說明；右上可切「學習者 / 稽核者(LA)視角」；點節點會把<b>相關的跨圖高亮</b>、其餘變暗。</p>
        <div class="ob-q">稽核三問當主線：<b>這是什麼架構？ · 有什麼風險？ · 產品/服務週期是什麼？</b></div>
        <div class="ob-actions">
          <button class="ob-go" id="ob-tour">▶ 帶我走一遍（稽核三問）</button>
          <button class="ob-skip" id="ob-skip">我自己逛</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
const SVGNS="http://www.w3.org/2000/svg";
const scene=document.getElementById("scene"), svg=document.getElementById("canvas");
const grid=document.getElementById("grid"), panel=document.getElementById("panel"), pbody=document.getElementById("pbody");
const toastEl=document.getElementById("toast");
let DATA=null, byId=new Map(), byRef=new Map(), adj=new Map(), curView="pdca", selected=null, overlay=false, mode="learn";

const el=(t,a,k)=>{const n=document.createElementNS(SVGNS,t);for(const x in a)n.setAttribute(x,a[x]);if(k)for(const c of [].concat(k))if(c)n.append(c);return n;};
const tx=(x,y,cls,s,ex)=>el("text",{x,y,class:cls,...(ex||{})},document.createTextNode(s));
const edgePt=(c,t,pad)=>{const dx=t.x-c.x,dy=t.y-c.y,d=Math.hypot(dx,dy)||1;return{x:c.x+dx/d*(c.r+(pad||0)),y:c.y+dy/d*(c.r+(pad||0))};};
function toast(m){toastEl.textContent=m;toastEl.classList.add("show");setTimeout(()=>toastEl.classList.remove("show"),1800);}

// which view a node belongs to
function homeView(id){const n=byId.get(id);if(!n)return "pdca";if(id.startsWith("control-"))return "controls";if(id.startsWith("ai-")||id.startsWith("band-"))return "ai";if(n.type==="risk-step"||n.type==="risk-technique"||n.type==="bridge")return "risk";return "pdca";}

// ---------- node builders ----------
function disc(id,name,num,x,y,r,center){const g=el("g",{class:"node","data-id":id,tabindex:"0",role:"button"});
  g.append(el("circle",{class:"disc"+(center?" center":""),cx:x,cy:y,r}));g.append(tx(x,y+2,"nm",name));g.append(tx(x,y+22,"num","["+num+"]"));
  wire(g,id,{x,y,r});return g;}
function box(id,title,sub,x,y,w,h,dash){const g=el("g",{class:"node","data-id":id,tabindex:"0",role:"button"});
  g.append(el("rect",{class:"box"+(dash?" dash":""),x,y,width:w,height:h,rx:10}));
  g.append(tx(x+w/2,y+(sub?h/2-4:h/2+5),"nm sm",title,{"text-anchor":"middle"}));
  if(sub)g.append(tx(x+w/2,y+h/2+14,"sub",sub,{"text-anchor":"middle"}));
  wire(g,id,{x:x+w/2,y:y+h/2,r:Math.max(w,h)/2});return g;}
function bar(id,title,x,y,w,h,vertical){const g=el("g",{class:"node","data-id":id,tabindex:"0",role:"button"});
  g.append(el("rect",{class:"bar",x,y,width:w,height:h,rx:10}));
  if(vertical){const cx=x+w/2,lh=26,sy=y+h/2-(title.length-1)*lh/2;
    [...title].forEach((ch,i)=>g.append(tx(cx,sy+i*lh,"nm sm",ch,{"text-anchor":"middle","dominant-baseline":"central"})));}
  else g.append(tx(x+w/2,y+h/2,"nm sm",title,{"text-anchor":"middle","dominant-baseline":"central"}));
  wire(g,id,{x:x+w/2,y:y+h/2,r:30});return g;}
function diamond(label,x,y,w,h){const g=el("g",{class:""});g.append(el("polygon",{class:"diamond",points:`${x},${y-h/2} ${x+w/2},${y} ${x},${y+h/2} ${x-w/2},${y}`}));
  g.append(tx(x,y+4,"diamond-text",label));return g;}
function wire(g,id,pos){g._pos=pos;g.addEventListener("click",e=>{e.stopPropagation();select(id);});
  g.addEventListener("keydown",e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();select(id);}});}
function arrow(d,accent){return el("path",{class:"flow-line",d,"marker-end":accent?"url(#aha)":"url(#ah)"});}

  for(const[a,b,lab]of ring){const p1=edgePt(a,b,6),p2=edgePt(b,a,6);const mx=(p1.x+p2.x)/2,my=(p1.y+p2.y)/2;

  const ay=496;scene.append(el("path",{class:"bigarrow",d:`M20,${ay} L182,${ay} L182,${ay-15} L224,${ay+8} L182,${ay+31} L182,${ay+16} L20,${ay+16} Z`}));

  if(overlay)drawOverlay({"clause-6.1.1":N.n6,"clause-7.1":N.n78,"clause-9.1":N.n9,"clause-10.1":N.n10,"clause-5.1":C});

function drawOverlay(anchors){
  // scatter control chips near the clause node they implement (control -> clause edges)
  const byClause={};
  for(const e of DATA.edges){if(e.from.startsWith("control-")&&anchors[e.to]){(byClause[e.to]=byClause[e.to]||[]).push(e.from);}}
  for(const cl in byClause){const a=anchors[cl];byClause[cl].forEach((cid,i)=>{const n=byId.get(cid);if(!n)return;
    const ang=-Math.PI/2+i*0.5;const cx=a.x+Math.cos(ang)*(a.r+44),cy=a.y+Math.sin(ang)*(a.r+44);
    const w=46,h=18;const g=el("g",{class:"ctrl-chip","data-id":cid});g.append(el("rect",{x:cx-w/2,y:cy-h/2,width:w,height:h,rx:5}));
    g.append(tx(cx,cy+3,null,n.ref));g.addEventListener("click",ev=>{ev.stopPropagation();select(cid);});scene.append(g);});}
}

// ---------- VIEW: AI lifecycle (ISO 5338/22989) ----------
function renderAI(){
  svg.setAttribute("viewBox","0 0 1340 720");
  scene.append(tx(40,40,"grp-label","AI 系統生命週期 — ISO/IEC 5338 / 22989"));
  const y=120,w=158,h=92,gap=20;const xs=[];let x=30;
  const stages=[["ai-inception","起始","Inception"],["ai-design-dev","設計與開發","Design & Dev"],["ai-vnv","查證與確證","V&V"],["ai-deployment","部署","Deployment"],["ai-operation-monitoring","營運與監督","Operation"],["ai-reevaluation","重新評估","Re-evaluation"],["ai-retirement","汰除","Retirement"]];
  for(const[id,t,en]of stages){scene.append(box(id,t,en,x,y,w,h,false));xs.push(x);x+=w+gap;}
  for(let i=0;i<stages.length-1;i++)scene.append(arrow(`M${xs[i]+w},${y+h/2} L${xs[i+1]},${y+h/2}`,true));
  // continuous validation above operation
  const opx=xs[4];scene.append(box("ai-continuous-validation","持續確證","Continuous validation",opx,y-110,w,80,true));
  scene.append(arrow(`M${opx+w/2},${y} L${opx+w/2},${y-30}`));
  // reevaluation loop back to design-dev
  const rex=xs[5]+w/2,ddx=xs[1]+w/2;scene.append(el("path",{class:"flow-line",d:`M${rex},${y+h} L${rex},${y+150} L${ddx},${y+150} L${ddx},${y+h}`,"marker-end":"url(#aha)"}));
  scene.append(tx((rex+ddx)/2,y+165,"flow-label","重新評估 → 回開發"));
  // 22989 bands
  const bands=[["band-devops","開發與營運 Develop & Operations"],["band-transparency","透明性與可解釋性 Transparency"],["band-security-privacy","安全與隱私保護 Security & privacy"],["band-risk","風險管理 Risk management"],["band-governance","組織治理 Governance"]];
  const by0=y+220,bh=44,bw=1280;
  bands.forEach(([id,t],i)=>scene.append(bar(id,t,30,by0+i*(bh+10),bw,bh,false)));
}

// ---------- VIEW: controls grid ----------
function renderControls(){
  const themes=[["A.5","組織控制 Organizational"],["A.6","人員控制 People"],["A.7","實體控制 Physical"],["A.8","技術控制 Technological"]];
  let html="";
  for(const[pre,tt]of themes){const cs=DATA.nodes.filter(n=>n.type==="control"&&(n.ref||"").startsWith(pre));
    html+=`<div class="theme"><div class="theme-h"><span class="th-ref">${pre}</span><span class="th-t">${tt}</span><span class="th-c">${cs.length} 控制</span></div><div class="chips">`;
    for(const c of cs)html+=`<div class="chip" data-id="${c.id}"><div class="c-ref">${c.ref}</div><div class="c-t">${c.title||""}</div></div>`;
    html+=`</div></div>`;}
  grid.innerHTML=html;
  grid.querySelectorAll(".chip").forEach(ch=>ch.addEventListener("click",()=>select(ch.dataset.id)));
}

// ---------- view switching ----------
const VIEWS={pdca:{n:"圖一",t:"PDCA 運轉",r:renderPDCA,cap:"圖一 · ISMS PDCA 運轉（條款 4–10）"},
  risk:{n:"圖二",t:"風險流程",r:renderRisk,cap:"圖二 · 風險管理流程（ISO 31000 / 27005）"},
  ai:{n:"圖三",t:"AI 生命週期",r:renderAI,cap:"圖三 · AI 系統生命週期（ISO/IEC 5338 / 22989）"},
  controls:{n:"附錄A",t:"控制措施",r:renderControls,cap:"附錄 A · 93 控制措施（4 主題）"}};
function buildTabs(){const tb=document.getElementById("tabs");tb.innerHTML="";
  for(const k in VIEWS){const v=VIEWS[k];const b=document.createElement("button");b.className="tab"+(k===curView?" on":"");
    b.innerHTML=`<span class="t-num">${v.n}</span><span class="t-txt">${v.t}</span>`;b.onclick=()=>switchView(k);tb.append(b);}}
function switchView(k,keepSel){curView=k;buildTabs();document.getElementById("cap").textContent=VIEWS[k].cap;
  const isGrid=k==="controls";svg.style.display=isGrid?"none":"block";grid.classList.toggle("show",isGrid);
  if(isGrid){renderControls();}else{scene.replaceChildren();VIEWS[k].r();}
  if(!keepSel){/*keep selection highlight if still in view*/}
  if(selected)highlight(selected);updateHash();}

// ---------- selection + panel ----------
function highlight(id){
  const nb=new Set([id]);for(const e of (adj.get(id)||[]))nb.add(e.other);
  scene.querySelectorAll(".node").forEach(g=>{const on=g.dataset.id===id,lk=nb.has(g.dataset.id);
    g.classList.toggle("sel",on);g.classList.toggle("linked",lk&&!on);g.classList.toggle("dim",!lk);});
  grid.querySelectorAll(".chip").forEach(c=>{const on=c.dataset.id===id,lk=nb.has(c.dataset.id);
    c.classList.toggle("sel",on);c.classList.toggle("dim",!lk);});
}
function select(id){
  const n=byId.get(id);if(!n)return;selected=id;
  const hv=homeView(id);if(hv!==curView)switchView(hv,true);
  highlight(id);openPanel(n);updateHash();
}
function typeName(t){return({clause:"CLAUSE 條款",control:"CONTROL 控制","risk-step":"RISK 風險流程","risk-technique":"TECHNIQUE 技術","lifecycle-stage":"LIFECYCLE 生命週期","cross-cutting-band":"BAND 橫向關注帶",bridge:"BRIDGE 橋樑"})[t]||"NODE";}
function openPanel(n){
  let h=`<div class="ovl">${typeName(n.type)}</div><span class="ref">${n.ref||n.id}</span><h2>${n.title||n.id}</h2>`;
  if(n.title_en)h+=`<div class="en">${n.title_en}</div>`;
  if(n.summary)h+=`<div class="sum">${n.summary}</div>`;
  if(n.explanation)h+=`<div class="sech">白話說明 · Explanation</div><div class="exp">${n.explanation}</div>`;
  if(mode==="audit"&&n.audit){
    const L=(arr,cls)=>arr.map(x=>`<div class="audit-item${cls||""}">${x}</div>`).join("");
    if(n.audit.questions?.length)h+=`<div class="sech ax">稽核問句 · Audit Questions</div>${L(n.audit.questions)}`;
    if(n.audit.evidence?.length)h+=`<div class="sech ax">應備證據 · Evidence</div>${L(n.audit.evidence)}`;
    if(n.audit.nonconformities?.length)h+=`<div class="sech ax">常見不符合 · Nonconformities</div>${L(n.audit.nonconformities," nc")}`;
  }
  if(n.attributes){const a=n.attributes;
    if(a.cia?.length){h+=`<div class="sech">CIA</div><div class="attrs">`+["機密性","完整性","可用性"].map(c=>`<span class="led ${a.cia.includes(c)?"on":""}"><span class="d"></span>${c}</span>`).join("")+`</div>`;}
    const more=[["控制類型",a.controlType],["作業能力",a.operationalCapability],["安全領域",a.securityDomain]].filter(([_,v])=>v?.length);
    for(const[lab,vals]of more)h+=`<div class="sech">${lab}</div><div class="attrs">`+vals.map(v=>`<span class="pill">${v}</span>`).join("")+`</div>`;}
  if(n.subconcepts?.length){h+=`<div class="sech">要求來源 · Sources</div>`+n.subconcepts.map(s=>`<div class="sc-item"><div class="sc-l">${s.label}</div>${s.note?`<div class="sc-n">${s.note}</div>`:""}</div>`).join("");}
  // sibling sub-clauses
  if(n.type==="clause"){const sec=(n.ref||"").split(".")[0];const sibs=DATA.nodes.filter(x=>x.type==="clause"&&(x.ref||"").split(".")[0]===sec&&x.id!==n.id);
    if(sibs.length)h+=`<div class="sech">同章節 · Clause ${sec}</div>`+sibs.map(s=>`<div class="rel" data-go="${s.id}"><span class="rel-chip">${s.ref}</span><span class="rel-t">${s.title||""}</span></div>`).join("");}
  // relations
  const rels=adj.get(n.id)||[];
  if(rels.length){h+=`<div class="sech">關聯 · Relations</div>`+rels.map(r=>{const o=byId.get(r.other);if(!o)return"";const cross=homeView(r.other)!==homeView(n.id);
    return `<div class="rel" data-go="${r.other}"><span class="rel-chip">${(r.rel||"").toUpperCase()}</span><span class="rel-arr">${r.dir==="out"?"→":"←"}</span><span class="rel-t">${o.ref?o.ref+" ":""}${o.title||o.id}</span>${cross?`<span class="rel-jump">跳 ${VIEWS[homeView(r.other)].n}</span>`:""}</div>`;}).join("");}
  pbody.innerHTML=h;
  pbody.querySelectorAll("[data-go]").forEach(r=>r.addEventListener("click",()=>select(r.dataset.go)));
  panel.classList.add("open");panel.setAttribute("aria-hidden","false");
}
function closePanel(){panel.classList.remove("open");panel.setAttribute("aria-hidden","true");selected=null;
  scene.querySelectorAll(".node").forEach(g=>g.classList.remove("sel","linked","dim"));grid.querySelectorAll(".chip").forEach(c=>c.classList.remove("sel","dim"));updateHash();}
document.getElementById("close").addEventListener("click",closePanel);
svg.addEventListener("click",()=>{if(selected)closePanel();});
document.addEventListener("keydown",e=>{if(e.key==="Escape")closePanel();if(e.key==="/"){e.preventDefault();document.getElementById("q").focus();}});

const q=document.getElementById("q"),results=document.getElementById("results");
q.addEventListener("input",()=>{const s=q.value.trim().toLowerCase();if(!s){results.classList.remove("open");return;}
  const hits=DATA.nodes.filter(n=>[n.ref,n.title,n.title_en,n.summary].some(v=>(v||"").toLowerCase().includes(s))).slice(0,40);
  results.innerHTML=hits.map(n=>`<div class="res-item" data-id="${n.id}"><span class="res-ref">${n.ref||""}</span><span class="res-t">${n.title||n.id}</span></div>`).join("")||`<div class="res-item"><span class="res-t" style="color:var(--text-3)">無結果</span></div>`;
  results.classList.add("open");results.querySelectorAll("[data-id]").forEach(r=>r.addEventListener("click",()=>{select(r.dataset.id);results.classList.remove("open");q.value="";}));});

// deep-link
function updateHash(){const p=new URLSearchParams();p.set("view",curView);if(overlay)p.set("ov","1");if(mode==="audit")p.set("mode","audit");if(selected)p.set("sel",selected);
  history.replaceState(null,"","#"+p.toString());}
function applyHash(){const p=new URLSearchParams(location.hash.replace(/^#/,""));const v=p.get("view");overlay=p.get("ov")==="1";
  document.getElementById("overlay-btn").classList.toggle("on",overlay);
  setMode(p.get("mode")==="audit"?"audit":"learn");
  switchView(v&&VIEWS[v]?v:"pdca",true);const s=p.get("sel");if(s&&byId.has(s))select(s);}
document.getElementById("copy").addEventListener("click",()=>{navigator.clipboard?.writeText(location.href);toast("已複製此視角連結");});

// ---------- guided tour: 稽核三問 ----------
const TOUR=[
  {view:"pdca",sel:"clause-5.1",title:"① 這是什麼架構？",text:"ISMS 用 PDCA 運轉：領導[5]為核心，規劃[6]→支援運作[7·8]→績效[9]→改善[10]，外圈計畫·執行·檢核·行動。範圍由條款 4.3 界定。"},
  {view:"pdca",sel:"clause-4.2",title:"① 範圍與要求來源",text:"先確認利害關係人(4.2)的 5 類要求來源：法律／監管／合約／標準／政策 —— 它們轉成『風險與改善機會』餵進規劃[6]。"},
  {view:"risk",sel:"risk-assessment",title:"② 有什麼風險？",text:"風險用 ISO 31000／27005 流程：風險評鑑(識別→分析→評估)。對應 27001 條款 6.1.2。"},
  {view:"risk",sel:"soa",title:"② 怎麼接到控制？",text:"風險處理選出控制、記入『適用性聲明 SoA』，再排風險處理計畫；剩餘風險須持續監督審查。對應條款 6.1.3。"},
  {view:"ai",sel:"ai-operation-monitoring",title:"③ 你們的產品／服務週期是什麼？",text:"AI 系統生命週期(ISO 5338／22989)：起始→開發→V&V→部署→營運監督→重新評估→汰除；治理／風險／安全等橫向帶貫穿全程。"},
  {view:"controls",sel:"control-a.5.31",title:"④ 證據：你做了哪些控制？",text:"附錄 A 93 控制是落地證據。現已切到『稽核者視角』—— 每條都有 稽核問句／應備證據／常見不符合，直接拿去稽核或教學。",mode:"audit"},
];
let tourIdx=-1;
const tcEl=document.getElementById("tourcard");
function showStep(i){tourIdx=i;const s=TOUR[i];
  if(s.mode)setMode(s.mode);
  switchView(s.view,true);if(s.sel)select(s.sel);
  document.getElementById("tc-step").textContent=(i+1)+" / "+TOUR.length;
  document.getElementById("tc-title").textContent=s.title;
  document.getElementById("tc-text").textContent=s.text;
  document.getElementById("tc-prev").disabled=i===0;
  document.getElementById("tc-next").textContent=i===TOUR.length-1?"完成 ✓":"下一步 ›";
  tcEl.classList.add("show");}
function startTour(){closeOnboard();showStep(0);}
function exitTour(){tourIdx=-1;tcEl.classList.remove("show");}
document.getElementById("tc-next").addEventListener("click",()=>{tourIdx<TOUR.length-1?showStep(tourIdx+1):exitTour();});
document.getElementById("tc-prev").addEventListener("click",()=>{if(tourIdx>0)showStep(tourIdx-1);});
document.getElementById("tc-exit").addEventListener("click",exitTour);
document.getElementById("tour-btn").addEventListener("click",startTour);
document.addEventListener("keydown",(e)=>{if(tourIdx<0)return;if(e.key==="ArrowRight")showStep(Math.min(tourIdx+1,TOUR.length-1));else if(e.key==="ArrowLeft")showStep(Math.max(tourIdx-1,0));else if(e.key==="Escape")exitTour();});
// ---------- onboarding ----------
function closeOnboard(){document.getElementById("onboard").classList.remove("show");try{localStorage.setItem("iso_seen","1");}catch(e){}}
document.getElementById("ob-skip").addEventListener("click",closeOnboard);
document.getElementById("ob-tour").addEventListener("click",startTour);

// ---------- boot ----------
(async function(){
  try{const r=await fetch("./data/data.json");DATA=await r.json();}catch(e){document.getElementById("cap").textContent="無法載入 data.json（需以 http 開啟）";return;}
  byId=new Map(DATA.nodes.map(n=>[n.id,n]));byRef=new Map(DATA.nodes.map(n=>[String(n.ref),n]));
  for(const e of DATA.edges){(adj.get(e.from)||adj.set(e.from,[]).get(e.from)).push({other:e.to,rel:e.rel,dir:"out"});
    (adj.get(e.to)||adj.set(e.to,[]).get(e.to)).push({other:e.from,rel:e.rel,dir:"in"});}
  if(DATA.meta?.accent)document.documentElement.style.setProperty("--accent",DATA.meta.accent);
  buildTabs();
  const firstVisit = location.hash.length<=1;   // capture before switchView rewrites the hash
  if(location.hash.length>1)applyHash();else switchView("pdca",true);
  try{ if(firstVisit && !localStorage.getItem("iso_seen")) document.getElementById("onboard").classList.add("show"); }catch(e){}
})();
</script>
